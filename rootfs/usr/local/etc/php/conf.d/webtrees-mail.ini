; Route PHP's mail() through the msmtp binary so webtrees' PHPMailer
; transport (when configured to use the system "sendmail" sender) reaches
; the operator-supplied SMTP relay rendered into /etc/msmtprc by the
; entrypoint's setup_mail step (#67). msmtp's `-t` flag reads the
; To/Cc/Bcc headers from the message body itself, matching the sendmail
; convention PHP's mail() expects.
;
; When MAIL_SMTP is unset the entrypoint leaves /etc/msmtprc empty/skeleton
; and PHP mail() invocations will fail loud at submission time rather
; than silently disappearing into a misconfigured queue. That fail-loud
; surface is intentional: operators not configuring SMTP should drive
; mail through webtrees' SMTP transport (Control panel → Site settings)
; instead, which bypasses sendmail_path entirely.
sendmail_path = "/usr/bin/msmtp -t"
