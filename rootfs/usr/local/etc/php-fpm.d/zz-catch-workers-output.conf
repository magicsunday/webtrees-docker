; Make php-fpm pipe each worker's stdout/stderr to the master process'
; stderr so docker logs picks them up. Without this, anything PHP (or a
; subprocess spawned from PHP, like msmtp via sendmail_path) writes to
; stderr is silently dropped by the worker — the operator sees no
; diagnostic when password-reset mail fails to send.
;
; decorate_workers_output = no removes the [pool www] prefix php-fpm
; would otherwise prepend to every line; msmtp's own log entries
; already carry enough context.
;
; Filename starts with `zz-` so php-fpm reads it AFTER the upstream
; www.conf in the same directory, overriding the commented-out default.
[www]
catch_workers_output = yes
decorate_workers_output = no
