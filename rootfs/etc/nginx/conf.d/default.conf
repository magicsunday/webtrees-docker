include includes/security-headers-map.conf;
include includes/trust-proxy-map.conf;

server {
    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;

    server_name _;

    # The composer-installed webtrees layout puts the bootstrap wrapper at
    # /var/www/html/public/index.php. vendor/, composer.json, modules and
    # webtrees data sit alongside public/ but outside the docroot so they
    # are unreachable over HTTP.
    root  /var/www/html/public;
    index index.php;

    charset utf-8;

    # Restrict max upload size to 256m
    client_max_body_size 256m;

    # Enforce call via https
    set $isHttps $https;

    if ($server_port = 443) {
        set $isHttps on;
    }

    # $xfp_https resolves to "on" only when X-Forwarded-Proto=https arrives
    # from a trusted-proxy CIDR (see includes/trust-proxy-map.conf). An
    # arbitrary LAN client reaching the published port directly is not
    # in the trust set, so its spoofed header cannot defeat the redirect.
    if ($xfp_https = on) {
        set $isHttps on;
    }

    include includes/enforce-https.conf;
    include includes/security-headers.conf;

    # Enable long browser caching for assets. This affects Frontend and Backend and increases performance.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|ttf|svg|eot|xml|gzip|br|xsl)$ {
        # etag is supported on nginx >= 1.3.3
        etag on;
        expires 1y;
        access_log off;
    }

    # GIT config files can contain credentials or other sensitive data.
    location /.git {
        deny all;
    }

    # Sensitive webtrees paths (app/, vendor/, modules_v4/, resources/, data/)
    # sit one level above the public/ docroot, so they are already unreachable
    # over HTTP without these deny rules — they are kept as a thin
    # defense-in-depth in case a future docroot change re-exposes them.
    location ~ ^/(app|vendor|modules_v4|resources|data)(/|$) {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Rewrite all other requests onto the webtrees frontend controller
    if (!-e $request_filename) {
        rewrite ^.*$ /index.php last;
    }

    include includes/php-proxy.conf;

    # User-supplied snippets — leave the directory empty by default; users
    # bind-mount their own .conf files in via compose.override.yaml.
    include /etc/nginx/conf.d/custom/*.conf;
}
