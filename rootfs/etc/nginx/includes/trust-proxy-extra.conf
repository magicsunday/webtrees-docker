# Operator-extensible part of the X-Forwarded-Proto trust gate.
#
# The baked content below is a placeholder that always resolves
# `$trusted_proxy_extra` to 0 so the combiner map in
# trust-proxy-map.conf has a defined input. When the entrypoint env
# var NGINX_TRUSTED_PROXIES is set, docker-entrypoint.d/35-trust-proxy-extra.sh
# REWRITES this file with a geo block listing the operator's CIDRs.
#
# Edit by env var, NOT by hand or bind-mount — the entrypoint clobbers
# any hand edits on container start. The baked form below exists only so
# `nginx -t` validates at image-build time, before the entrypoint runs.
#
# Keep this geo block byte-identical to write_placeholder() in
# docker-entrypoint.d/35-trust-proxy-extra.sh so a rename of
# $trusted_proxy_extra does not drift between build-time and runtime.
geo $trusted_proxy_extra {
    default 0;
}
