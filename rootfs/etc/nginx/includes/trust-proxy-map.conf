# Trust gate for X-Forwarded-Proto. nginx must only flip $isHttps to "on"
# (and thus skip the enforce-https 301 redirect) when the request came
# from a source we trust to set the header truthfully.
#
# What this gate closes:
#   * External LAN attacker reaching the published host port directly
#     (e.g. a misconfigured firewall, port-forward, or homelab on the
#     same /24 as the nginx host). Those packets arrive with the real
#     client IP — typically 192.168.x.x or 10.x — which is outside the
#     trust set, so the spoofed header is ignored and the 301 fires.
#
# What this gate does NOT close (by design — these are inherent docker
# network trust boundaries):
#   * Sibling containers in the same docker network (compose backup
#     sidecars, exporters, third-party plugin images, anything pulled
#     by an auto-updater). Their source IP falls inside 172.16.0.0/12,
#     so they ARE trusted and CAN flip $isHttps. The mitigation is
#     operational: only run containers in this stack that you would
#     trust with the same secrets nginx serves.
#   * Docker daemons running in userland-proxy mode (Docker Desktop on
#     Mac/Windows, rootless Docker, hosts without iptables NAT). They
#     rewrite every inbound source IP to the bridge gateway 172.17.0.1
#     before nginx sees it, putting external traffic inside the trust
#     range. Set userland-proxy=false in daemon.json on Linux Engine,
#     or terminate TLS upstream so the header bypass is irrelevant.
#
# Trust set rationale (conservative defaults):
#   127.0.0.0/8, ::1     — local probes inside the container (healthcheck).
#   172.16.0.0/12        — Docker's default user-bridge range (compose
#                          projects, the bundled Traefik overlay). See
#                          the explicit caveats above; this entry is a
#                          deliberate trade-off between out-of-the-box
#                          Traefik support and inter-container isolation.
#   fc00::/7             — IPv6 ULA, Docker's IPv6 network range.
#
# Intentionally NOT trusted by default: 10.0.0.0/8 and 192.168.0.0/16 are
# common home/office LAN ranges, so trusting them would re-open the bypass
# whenever the operator publishes nginx onto a LAN-reachable port.
# Operators with custom docker networks outside 172.16.0.0/12 (corporate
# VPC, etc.) must terminate TLS at the proxy and not rely on the header
# bypass — or extend this file via a bind-mount in compose.override.yaml.
#
# `real_ip_header` is not used here: it is designed for IP-bearing headers
# (X-Forwarded-For, X-Real-IP) where the value rewrites $remote_addr.
# X-Forwarded-Proto carries a scheme, not an IP, so we use geo + map to
# combine the trust decision with the header value.
geo $trusted_proxy {
    default 0;
    127.0.0.0/8 1;
    ::1/128 1;
    172.16.0.0/12 1;
    fc00::/7 1;
}

# Normalise the header value before the trust composite. Proxies forward
# the scheme in mixed case (RFC 7239 §5.4 allows "https"/"HTTPS") and some
# chained-proxy setups send a comma-list ("https, http"). The case-
# insensitive ~* anchored regex collapses every accepted form to a fixed
# "https" token; everything else (including the no-header case) drops to
# the empty string and never trips the trust gate.
map $http_x_forwarded_proto $xfp_scheme {
    ~*^[[:space:]]*https([[:space:]]*,.*)?$ https;
    default                                 "";
}

map "$trusted_proxy:$xfp_scheme" $xfp_https {
    "1:https"   on;
    default     "";
}
