# Development-specific volume configuration
# These settings override the base configuration to use local directories for development
volumes:
    # Application files volume - maps to the local ./app directory
    app:
        driver: local
        driver_opts:
            type: none
            device: ${WORK_DIR:-${PWD}}/app
            o: bind
    # Media files volume - maps to local ./persistent/media directory.
    # Only media is bind-mounted; config.ini.php and cache stay inside the
    # app volume because they are container-internal and re-seedable.
    # WORK_DIR is exported by the wizard's .env (set from the host's $PWD
    # by the launcher script) so bind-mount paths resolve on the host
    # docker daemon even when compose runs inside the installer container.
    # Falling back to ${PWD} keeps the direct-host workflow (running
    # compose from a shell, not through the wizard) intact.
    media:
        driver: local
        driver_opts:
            type: none
            device: ${MEDIA_DIR:-${WORK_DIR:-${PWD}}/persistent/media}
            o: bind
    # Database files volume - maps to local ./persistent/database directory
    database:
        driver: local
        driver_opts:
            type: none
            device: ${WORK_DIR:-${PWD}}/persistent/database
            o: bind

# Base configuration for buildbox services
# This is a template used by both buildbox and buildbox-root services
x-buildbox-base: &buildbox-base
    build:
        # Build configuration for the buildbox container
        context: .
        dockerfile: ./Dockerfile
        # Use the build-box target in the Dockerfile
        target: build-box
        args:
            - PHP_VERSION
            - DOCKER_SERVER
            - WEBTREES_VERSION
            - VCS_REF
            - BUILD_DATE
    image: ${DOCKER_SERVER}/webtrees/buildbox:${PHP_VERSION}
    depends_on:
        - db
        - phpfpm
    # Set the working directory to the project root
    working_dir: /var/webtrees
    # Load environment variables from .env file
    env_file:
        - .env
    environment:
        # Forward SSH agent for Git operations
        - SSH_AUTH_SOCK=/ssh-agent
        # Set terminal type for better CLI experience
        - TERM=xterm-256color
        # Buildbox uses the host bind-mount of ./app — never seed
        - WEBTREES_AUTO_SEED=false
    volumes:
        # System timezone configuration
        - /etc/timezone:/etc/timezone:ro
        - /etc/localtime:/etc/localtime:ro
        # Mount the project directory
        - ./:/var/webtrees
        # Mount SSH and Git configuration
        - ${HOME}/.ssh:/root/.ssh
        - ${HOME}/.gitconfig:/root/.gitconfig:ro
        - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
    networks:
        - default

services:
    # Buildbox service running as root
    # Used for operations that require elevated privileges
    buildbox-root:
        <<: *buildbox-base
        entrypoint: "/opt/root-entrypoint.sh"
        environment:
            # Composer authentication for private repositories
            - COMPOSER_AUTH

    # Buildbox service running as a regular user
    # Used for day-to-day development tasks
    buildbox:
        <<: *buildbox-base

    # Override phpfpm in dev: ./app is bind-mounted into /var/www and must
    # never be overwritten by the seed. Adds a build context so `make build`
    # rebuilds the local image instead of pulling from the registry.
    phpfpm:
        build:
            context: .
            dockerfile: ./Dockerfile
            target: php-build
            args:
                - PHP_VERSION
                - WEBTREES_VERSION
                - VCS_REF
                - BUILD_DATE
        environment:
            - WEBTREES_AUTO_SEED=false

    # In dev mode rebuild webtrees-nginx locally + bind-mount configs writable
    # so changes apply via `nginx -s reload` without an image rebuild.
    nginx:
        build:
            context: .
            dockerfile: ./Dockerfile
            target: nginx-build
            args:
                - NGINX_CONFIG_REVISION
                - VCS_REF
                - BUILD_DATE
        volumes:
            - ./rootfs/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
            - ./rootfs/etc/nginx/includes:/etc/nginx/includes
            - ./rootfs/etc/nginx/templates:/etc/nginx/templates

    # Nginx host-port publishing lives in compose.publish.yaml. Include that
    # overlay alongside this one to bind APP_PORT on the host.

    # Browser for testing with web-based debugger and CDP endpoint.
    # Debugger UI:  http://localhost:3000
    # CDP endpoint: ws://localhost:3000
    # Live view:    http://localhost:3000 → Sessions tab
    browser:
        image: browserless/chrome:latest
        restart: unless-stopped
        environment:
            - CONNECTION_TIMEOUT=600000
            - IGNORE_HTTPS_ERRORS=true
            - DEFAULT_LAUNCH_ARGS=["--ignore-certificate-errors","--no-sandbox"]
        ports:
            - "${BROWSER_PORT:-3000}:3000"
        networks:
            - default

    # Override phpMyAdmin service to add port mapping and default credentials
    pma:
        ports:
            - "${PMA_PORT:-50011}:80"
        environment:
            PMA_USER: ${MARIADB_USER}
            PMA_PASSWORD: ${MARIADB_PASSWORD}
