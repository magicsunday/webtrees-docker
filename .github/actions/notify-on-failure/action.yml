name: Notify on workflow failure
description: >-
    Opens a tracking issue in the current repository describing a failed
    workflow run, then (optionally) assigns it to the Copilot Coding Agent.
    Intended for use in a job gated by `if: failure() && github.event_name
    != 'pull_request'`.

inputs:
    copilot-pat:
        description: >-
            Personal access token used to assign the tracking issue to
            copilot-swe-agent. The default GITHUB_TOKEN is a GitHub-App
            token and the /repos/.../assignees endpoint rejects bot
            accounts on such tokens (see github/cli #11362), so a real
            PAT is required for the assignment to succeed. Leave unset
            to skip the assignment with a notice.
        required: false
        default: ''

runs:
    using: composite
    steps:
        - name: Open tracking issue
          shell: bash
          env:
              # Callers run actions/checkout before this composite (required
              # for GHA to load the action.yml from ./.github/actions/…), so
              # the gh CLI could discover the repo from .git/config. GH_REPO
              # is still set as an explicit override so a future call site
              # that forgets the checkout fails on the action-load itself,
              # not silently inside `gh issue create`.
              GH_TOKEN: ${{ github.token }}
              GH_REPO: ${{ github.repository }}
              RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              COPILOT_PAT: ${{ inputs.copilot-pat }}
              WORKFLOW_NAME: ${{ github.workflow }}
              RUN_NUMBER: ${{ github.run_number }}
              RUN_ID: ${{ github.run_id }}
              EVENT_NAME: ${{ github.event_name }}
              REF_NAME: ${{ github.ref_name }}
          run: ./scripts/workflow/notify-on-failure.sh
