name: Check for new webtrees versions

# Polls fisharebest/webtrees once a day. For every release strictly newer
# than the highest version in dev/versions.json the workflow:
#   1. opens a PR that bumps dev/versions.json (rolling tags follow the
#      new version, older rows keep only their version-pinned slots),
#   2. enables auto-merge on that PR (squash) so a green CI flips it in,
#   3. dispatches the build workflow for the new version,
#   4. opens a tracking issue pointing at the PR + dispatched run.
# Older missing entries (e.g. 2.0.x while we ship only 2.2.x) are
# deliberately ignored.
on:
    schedule:
        - cron: '0 12 * * *'
    workflow_dispatch:

permissions:
    contents: write
    issues: write
    pull-requests: write
    actions: write

jobs:
    check:
        runs-on: ubuntu-latest
        # Default job timeout is 6h; a GitHub/Packagist hang would burn
        # the full window before the next cron iteration. 20m covers a
        # normal upstream-release probe with headroom for slowdowns.
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6

            - name: Find releases newer than the tracked max
              id: find
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  upstream=$(gh api repos/fisharebest/webtrees/releases --jq '.[].tag_name' | head -50)
                  # Bail loud if the API returned nothing (auth, rate limit, network):
                  # otherwise downstream comparisons see an empty stream and the step
                  # silently reports "no new versions".
                  [ -n "$upstream" ] || { echo "::error::gh api returned no releases" >&2; exit 1; }
                  max_known=$(jq -r '.[].webtrees' dev/versions.json | sort -V | tail -1)
                  [ -n "$max_known" ] || { echo "::error::dev/versions.json carries no entries" >&2; exit 1; }
                  # Seed max_known into the merged stream so the awk position-scan flips
                  # even when upstream's 50-tag window cuts max_known off. After `sort -uV`
                  # max_known appears exactly once at its proper place, and every line
                  # that follows is — by `sort -V`'s total ordering on dotted versions —
                  # strictly newer.
                  new=$(printf '%s\n%s\n' "$upstream" "$max_known" \
                      | sort -uV \
                      | awk -v max="$max_known" 'past && $0 != max { print } $0 == max { past = 1 }' \
                      | head -20)
                  {
                      echo 'new<<EOF'
                      printf '%s\n' "$new"
                      echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Bump dev/versions.json, open PR, dispatch build, file issue
              if: steps.find.outputs.new != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  # The bot identity that authors the auto-bump commit; matches
                  # the actor github-actions uses for API calls so the commit
                  # links to the workflow run in the UI.
                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

                  # Accumulator for dispatch failures inside the loop —
                  # we want every version to get its branch + PR even
                  # if one dispatch flakes, then exit non-zero after
                  # the loop so notify-on-failure picks up the
                  # accumulated list.
                  dispatch_failures=""

                  while IFS= read -r version; do
                      [ -z "$version" ] && continue
                      branch="auto-bump/webtrees-${version}"
                      title="Bump dev/versions.json for webtrees ${version}"
                      issue_title="Webtrees ${version} released — bump dev/versions.json"

                      # Skip the version entirely if its bump branch already
                      # exists on the remote; the previous cron iteration
                      # already opened the PR (and possibly the issue).
                      if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
                          echo "Branch $branch already exists on origin — skipping $version"
                          continue
                      fi

                      # Snapshot the rolling-tag bundle and the PHP slot that
                      # currently carries `latest` BEFORE mutating the file.
                      # The new row inherits the bundle; the previous holder
                      # loses it. If no row carries `latest` something is off
                      # with versions.json — bail loud rather than silently
                      # shipping a release without rolling tags.
                      rolling=$(jq -c '[.[] | select(.tags | index("latest")) | .tags[]] | unique' dev/versions.json)
                      canonical_php=$(jq -r '.[] | select(.tags | index("latest")) | .php' dev/versions.json)
                      [ -n "$canonical_php" ] || { echo "::error::no row in dev/versions.json carries 'latest'"; exit 1; }

                      # Re-render in the project's compact one-row-per-line
                      # style: `jq -c` packs without spaces, then sed restores
                      # the `": "` / `, "` separators so the diff stays minimal.
                      # The new entry opens three PHP rows (8.3/8.4/8.5) to
                      # mirror the existing matrix; the row at canonical_php
                      # carries the rolling bundle.
                      #
                      # The final array is partitioned so every row carrying
                      # a `latest`-style tag comes first — a cosmetic-stable
                      # ordering for diff readability. Row order carries no
                      # semantic meaning: `ci-readme-badge-lockstep` asserts
                      # that every unique webtrees / php value across all
                      # rows appears in the static README badge URLs,
                      # independent of which row carries which value.
                      new_rows=$(jq -c --arg ver "$version" --arg php "$canonical_php" --argjson rolling "$rolling" '
                          (map(.tags -= $rolling)
                           + ([["8.3"], ["8.4"], ["8.5"]]
                              | map(.[0] as $p | {webtrees: $ver, php: $p, tags: (if $p == $php then $rolling else [] end)})))
                          | [.[] | select(.tags | index("latest"))] + [.[] | select(.tags | index("latest") | not)]
                          | .[]
                      ' dev/versions.json \
                          | sed -e 's/":"/": "/g' -e 's/":\[/": [/g' -e 's/,"/, "/g')
                      {
                          printf '[\n'
                          n=$(printf '%s\n' "$new_rows" | grep -c '')
                          i=0
                          while IFS= read -r row; do
                              i=$((i + 1))
                              if [ "$i" -lt "$n" ]; then
                                  printf '    %s,\n' "$row"
                              else
                                  printf '    %s\n' "$row"
                              fi
                          done <<< "$new_rows"
                          printf ']\n'
                      } > dev/versions.json.new
                      mv dev/versions.json.new dev/versions.json

                      # ci-readme-badge-lockstep asserts every unique
                      # `.webtrees` / `.php` value in versions.json appears
                      # in the static README badge URLs. The bump above
                      # may have introduced a new unique value (e.g. a
                      # new webtrees X.Y.Z patch); rewrite both badges
                      # from the just-updated versions.json so the lockstep
                      # check (and therefore auto-merge) stays green.
                      # Each docker run is wrapped with an explicit
                      # `::error::` annotation so a registry hiccup
                      # (slow ghcr.io pull, daemon flake) surfaces with
                      # an actionable pointer rather than a cryptic
                      # `set -e` step abort. Mirrors Make/ci.mk's
                      # docker-jq guard.
                      wt_values=$(docker run --rm -v "$(pwd)/dev:/d:ro" -w /d ghcr.io/jqlang/jq:latest \
                          -r '[.[].webtrees | select(type == "string" and (. | test("\\S")))] | unique | sort_by(split(".") | map(tonumber? // 0)) | join("|")' versions.json) \
                          || { echo "::error::docker run for webtrees pin extraction failed; check ghcr.io reachability and dev/versions.json syntax"; exit 1; }
                      php_values=$(docker run --rm -v "$(pwd)/dev:/d:ro" -w /d ghcr.io/jqlang/jq:latest \
                          -r '[.[].php | select(type == "string" and (. | test("\\S")))] | unique | sort_by(split(".") | map(tonumber? // 0)) | join("|")' versions.json) \
                          || { echo "::error::docker run for php pin extraction failed; check ghcr.io reachability and dev/versions.json syntax"; exit 1; }
                      # Mirror Make/ci.mk's empty-result guard so an
                      # all-non-string versions.json fails the workflow
                      # loud instead of writing `webtrees--blue` into
                      # the README.
                      if [ -z "$wt_values" ] || [ -z "$php_values" ]; then
                          echo "::error::empty pin extraction (webtrees=$wt_values php=$php_values); refusing to rewrite README badges"
                          exit 1
                      fi
                      wt_encoded=$(printf '%s' "$wt_values" | sed 's#|#%7C#g')
                      php_encoded=$(printf '%s' "$php_values" | sed 's#|#%7C#g')
                      # Rewrite via a separate Python script (not an
                      # inline heredoc) so YAML indentation cannot leak
                      # into Python statements. A `sed s/[^-]+/.../`
                      # would silently no-op once a hyphen lands in the
                      # message field (pre-release tags like
                      # `2.3.0-beta.1`) — see the lockstep test
                      # "renderer added webtrees row without README
                      # sync fails" for the cascade.
                      python3 scripts/rewrite-readme-badges.py "$wt_encoded" "$php_encoded"

                      git checkout -b "$branch"
                      git add dev/versions.json README.md
                      git commit -m "$title"
                      git push origin "$branch"

                      pr_url=$(gh pr create \
                          --title "$title" \
                          --body "Auto-detected new upstream release \`${version}\`. The rolling \`latest\`/major/minor tags move to the new row on PHP ${canonical_php}; older rows keep only their version-pinned slot. The build workflow has already been dispatched against this branch so images start baking in parallel with the review; auto-merge (squash) is enabled so a green CI flips this PR in." \
                          --base main \
                          --head "$branch")
                      gh pr merge --auto --squash "$pr_url" || echo "::warning::auto-merge could not be enabled on $pr_url"

                      # Build workflow only fires on tag-push or
                      # workflow_dispatch — kick it off explicitly so the new
                      # image starts baking in parallel with the PR review.
                      # Dispatch is pinned to the bump branch (not `main`),
                      # otherwise the build's matrix step reads the still
                      # unbumped versions.json on main and errors with
                      # "webtrees X not present in dev/versions.json".
                      #
                      # Collect-then-fail-at-end semantics: a transient
                      # gh-CLI 5xx mid-loop must NOT short-circuit the
                      # remaining iterations (orphan-PR + skipped-version
                      # cascade). Append the failure to a list, finish
                      # the iteration's cleanup (tracking issue, return
                      # to main), and exit non-zero only after the loop
                      # so notify-on-failure picks it up while later
                      # versions still get their branches + PRs.
                      #
                      # Scope: collect-then-fail discipline applies to
                      # `gh workflow run` dispatches only. Registry-fetch,
                      # pin-extraction, and python-rewriter steps remain
                      # fail-fast — they signal either a versions.json
                      # schema break (persistent; every iteration would
                      # corrupt identically) or a registry hiccup (usually
                      # short but accepted as a one-cron-cycle delay,
                      # because the next milliseconds-later docker pull
                      # in the same iteration is overwhelmingly likely to
                      # fail too). Self-healing kicks in on the next 24h
                      # cron once the upstream condition clears.
                      if ! gh workflow run build.yml --ref "$branch" -f webtrees_version="$version"; then
                          dispatch_failures="${dispatch_failures}${version} "
                          echo "::warning::build.yml dispatch for $version failed; loop continues, exit non-zero at end"
                      fi

                      # Tracking issue keeps the daily-cron signal visible in
                      # the issue tracker. Skip re-creating if a prior run
                      # already filed one. Capture the count separately so a
                      # transient gh-CLI failure propagates as a workflow-
                      # level failure rather than being swallowed by the
                      # pipefail-vs-if interaction that silently skips create.
                      existing=$(gh issue list --state all --search "$issue_title in:title" --json number --jq 'length') || {
                          echo "::error::gh issue list failed for '$issue_title'"
                          exit 1
                      }
                      if [ "$existing" = "0" ]; then
                          gh issue create \
                              --title "$issue_title" \
                              --body "Upstream released webtrees \`${version}\`. Auto-bump PR: ${pr_url}. Build workflow was dispatched against \`${branch}\` with input \`webtrees_version=${version}\`; track the run in the Actions tab."
                      else
                          echo "Issue for $version already exists — skipping"
                      fi

                      # Return to main so the next loop iteration starts from
                      # the unbumped manifest (each version gets its own
                      # branch + PR).
                      git checkout main
                      git reset --hard origin/main
                  done <<< "${{ steps.find.outputs.new }}"

                  if [ -n "$dispatch_failures" ]; then
                      echo "::error::build.yml dispatch failed for: ${dispatch_failures% }"
                      exit 1
                  fi

    notify-on-failure:
        name: Notify on workflow failure
        needs: [check]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            issues: write
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/notify-on-failure
              with:
                  copilot-pat: ${{ secrets.COPILOT_PAT }}
