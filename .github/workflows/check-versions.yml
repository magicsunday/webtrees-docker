name: Check for new webtrees versions

# Polls fisharebest/webtrees once a day and opens an issue per release
# that is strictly newer than the highest version in dev/versions.json.
# Older missing entries (e.g. 2.0.x while we ship only 2.2.x) are
# deliberately ignored — the build workflow stays manual, a human
# reviews the issue and updates versions.json + triggers the build.
on:
    schedule:
        - cron: '0 12 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Find versions not yet in dev/versions.json
              id: find
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  upstream=$(gh api repos/fisharebest/webtrees/releases --jq '.[].tag_name' | head -50)
                  # Bail loud if the API returned nothing (auth, rate limit, network):
                  # otherwise downstream comparisons see an empty stream and the step
                  # silently reports "no new versions".
                  [ -n "$upstream" ] || { echo "::error::gh api returned no releases" >&2; exit 1; }
                  max_known=$(jq -r '.[].webtrees' dev/versions.json | sort -V | tail -1)
                  [ -n "$max_known" ] || { echo "::error::dev/versions.json carries no entries" >&2; exit 1; }
                  # Seed max_known into the merged stream so the awk position-scan flips
                  # even when upstream's 50-tag window cuts max_known off. After `sort -uV`
                  # max_known appears exactly once at its proper place, and every line
                  # that follows is — by `sort -V`'s total ordering on dotted versions —
                  # strictly newer.
                  new=$(printf '%s\n%s\n' "$upstream" "$max_known" \
                      | sort -uV \
                      | awk -v max="$max_known" 'past && $0 != max { print } $0 == max { past = 1 }' \
                      | head -20)
                  {
                      echo 'new<<EOF'
                      printf '%s\n' "$new"
                      echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Open issues for new versions
              if: steps.find.outputs.new != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  while IFS= read -r version; do
                      [ -z "$version" ] && continue
                      title="Webtrees $version released — bump dev/versions.json"
                      if gh issue list --state all --search "$title in:title" --json number --jq 'length' | grep -q '^0$'; then
                          gh issue create \
                              --title "$title" \
                              --body $'Upstream released webtrees `'"$version"$'`.\n\nTo build and push:\n1. Add an entry to `dev/versions.json` for this version.\n2. Trigger the **Build and push image** workflow with the version as input.'
                      else
                          echo "Issue for $version already exists — skipping"
                      fi
                  done <<< "${{ steps.find.outputs.new }}"
