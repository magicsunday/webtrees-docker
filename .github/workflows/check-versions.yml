name: Check for new webtrees versions

# Polls fisharebest/webtrees once a day. For every release strictly newer
# than the highest version in dev/versions.json the workflow:
#   1. opens a single PR that bumps dev/versions.json AND README.md
#      atomically (rolling tags follow the newest version, older rows
#      keep only their version-pinned slots), batching all new versions
#      into one commit on one branch,
#   2. enables auto-merge on that PR (squash) so a green CI flips it in,
#   3. dispatches the build workflow for each new version against the
#      bump branch,
#   4. opens one tracking issue per new version pointing at the shared
#      PR + dispatched run.
#
# README/catalog atomic coupling: the badge-URL rewriter runs in the
# same step as the catalog edit so the single commit carries both
# files. `ci-readme-badge-lockstep` runs on every PR via ci-test.yml
# and is membership-strict (every value in versions.json must appear
# in the README badge URL set) — a catalog-only PR would fail the
# lockstep and block its own auto-merge. Coupling both edits into one
# commit closes that cascade.
#
# Cross-window safety: the workflow-level `concurrency: group:
# check-versions, cancel-in-progress: false` block below serialises
# simultaneous runs (cron + workflow_dispatch) so two iterations
# cannot race on the same dev/versions.json + README.md edits and
# fight over the orphan-branch self-heal.
#
# Older missing entries (e.g. 2.0.x while we ship only 2.2.x) are
# deliberately ignored.
on:
    schedule:
        - cron: '0 12 * * *'
    workflow_dispatch:

permissions:
    contents: write
    issues: write
    pull-requests: write
    actions: write

# Serialise overlapping runs so a manual `workflow_dispatch` cannot race
# the daily cron between the branch-existence probe and the orphan-delete
# decision. Without this, two simultaneous runs could observe the same
# pre-`gh pr create` window and one would force-delete the other's branch.
concurrency:
    group: check-versions
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        # Default job timeout is 6h; a GitHub/Packagist hang would burn
        # the full window before the next cron iteration. 20m covers a
        # normal upstream-release probe with headroom for slowdowns.
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6

            - name: Find releases newer than the tracked max
              id: find
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  upstream=$(gh api repos/fisharebest/webtrees/releases --jq '.[].tag_name' | head -50)
                  # Bail loud if the API returned nothing (auth, rate limit, network):
                  # otherwise downstream comparisons see an empty stream and the step
                  # silently reports "no new versions".
                  [ -n "$upstream" ] || { echo "::error::gh api returned no releases" >&2; exit 1; }
                  max_known=$(jq -r '.[].webtrees' dev/versions.json | sort -V | tail -1)
                  [ -n "$max_known" ] || { echo "::error::dev/versions.json carries no entries" >&2; exit 1; }
                  # Seed max_known into the merged stream so the awk position-scan flips
                  # even when upstream's 50-tag window cuts max_known off. After `sort -uV`
                  # max_known appears exactly once at its proper place, and every line
                  # that follows is — by `sort -V`'s total ordering on dotted versions —
                  # strictly newer.
                  #
                  # `head -20` caps the per-cron-iteration batch size at 20 new
                  # versions. Anything larger is a sign of upstream catastrophe
                  # or a corrupted versions.json; one PR with 20 rows is already
                  # the outer bound of "still reviewable".
                  new=$(printf '%s\n%s\n' "$upstream" "$max_known" \
                      | sort -uV \
                      | awk -v max="$max_known" 'past && $0 != max { print } $0 == max { past = 1 }' \
                      | head -20)
                  {
                      echo 'new<<EOF'
                      printf '%s\n' "$new"
                      echo 'EOF'
                  } >> "$GITHUB_OUTPUT"

            - name: Batch bump dev/versions.json, open one PR, dispatch builds, file issues
              if: steps.find.outputs.new != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Route the upstream-derived release-tag list through an
                  # env var rather than `${{ … }}` interpolation directly
                  # into the shell script. A hostile upstream tag
                  # containing `"`, `$()`, or backticks would otherwise
                  # break out of the here-string context and execute as
                  # shell at workflow-launch time. With `env:` the value
                  # is bound to a runtime variable bash reads verbatim.
                  NEW_VERSIONS: ${{ steps.find.outputs.new }}
              run: |
                  set -euo pipefail
                  ./scripts/batch-bump-webtrees-versions.sh

    notify-on-failure:
        name: Notify on workflow failure
        needs: [check]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            issues: write
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/notify-on-failure
              with:
                  copilot-pat: ${{ secrets.COPILOT_PAT }}
