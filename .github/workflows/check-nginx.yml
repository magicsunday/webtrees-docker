name: Check for nginx updates

# Polls Docker Hub once a day at 13:00 UTC for new nginx minor releases
# beyond what `dev/nginx-version.json` currently pins. Thin caller of
# `cron-docker-hub-poll.yml` (#140).

on:
    schedule:
        - cron: '0 13 * * *'
    workflow_dispatch:

# A reusable-workflow caller's top-level permissions cap what the called
# workflow's jobs can request (the repo's default GITHUB_TOKEN is
# read-only). cron-docker-hub-poll.yml's jobs need issues: write (file the
# bump issue) and actions: write (dispatch the rebuild); a job-level grant
# in the reusable workflow cannot exceed this cap, so without the block the
# call is rejected at startup (startup_failure, no logs). Restores the set
# the standalone poller carried before the GH-140 consolidation.
permissions:
    contents: read
    issues: write
    actions: write

jobs:
    check:
        uses: ./.github/workflows/cron-docker-hub-poll.yml
        secrets:
            copilot_pat: ${{ secrets.COPILOT_PAT }}
        with:
            image_label: nginx
            # Single source of truth: dev/nginx-version.json `.nginx_base`
            # carries the X.Y minor; the rendered nginx-build stage in
            # Dockerfile uses `nginx:<X.Y>-alpine`.
            pin_command: "jq -r .nginx_base dev/nginx-version.json"
            repo_name: nginx
            name_filter: alpine
            regex: '^1\.[0-9]+-alpine$'
            # nginx-specific variants:
            #   strip_suffix=-alpine     drops the suffix so the result
            #                            compares directly against
            #                            `.nginx_base`.
            #   even_minors_only=1       project policy pins only even
            #                            minors (1.26, 1.28, 1.30, …);
            #                            odd minors are the mainline
            #                            channel and not production-suited.
            #                            Documented in docs/maintenance.md.
            strip_suffix: '-alpine$'
            even_minors_only: '1'
            title_template: 'nginx ${VER}-alpine available — consider bumping dev/nginx-version.json'
            body_template: |
                Docker Hub publishes a `nginx:${VER}-alpine` tag newer than the current pin.

                **Action checklist** — see [docs/maintenance.md → Bumping the nginx pin](../blob/main/docs/maintenance.md#bumping-the-nginx-pin) for the full procedure:

                  1. Review release notes for nginx ${VER} (config-format / module-set changes).
                  2. Run `./scripts/bump/bump-nginx.sh ${VER}` — updates `dev/nginx-version.json` and syncs the 5 mirror sites enforced by the lockstep test. (`make bump-nginx VERSION=${VER}` is the equivalent convenience form for trusted-local invocations; see docs/maintenance.md for the trust-model trade-off.)
                  3. Run `make ci-pytest ci-lockstep-tests ci-nginx-config` locally.
                  4. Open a PR; `build.yml` rebuilds the nginx image stage.
                  5. After merge, pull the new image on the live host: `docker pull ghcr.io/magicsunday/webtrees-nginx:${VER}-r1`.
