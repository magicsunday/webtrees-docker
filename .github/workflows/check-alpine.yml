name: Check for Alpine updates

# Polls Docker Hub once a day at 12:45 UTC for new Alpine minor releases
# beyond what the installer currently pins. Thin caller of the shared
# `cron-docker-hub-poll.yml` reusable workflow (#140).

on:
    schedule:
        - cron: '45 12 * * *'
    workflow_dispatch:

jobs:
    check:
        uses: ./.github/workflows/cron-docker-hub-poll.yml
        secrets:
            copilot_pat: ${{ secrets.COPILOT_PAT }}
        with:
            image_label: Alpine
            # ci-alpine-lockstep enforces `alpine:X.Y` shape on every
            # PR; by the time this cron runs the pin is guaranteed to
            # be `alpine:X.Y` (no patch).
            pin_command: 'p=$(./scripts/lockstep/parse-alpine-pin.sh); echo "${p#alpine:}"'
            repo_name: alpine
            name_filter: '3.'
            regex: '^[0-9]+\.[0-9]+$'
            title_template: 'Alpine ${VER} available — consider bumping installer/webtrees_installer/_alpine.py'
            body_template: |
                Docker Hub publishes an `alpine:${VER}` tag newer than the installer's current pin.

                **Action checklist** — see [docs/maintenance.md → Bumping the Alpine pin](../blob/main/docs/maintenance.md#bumping-the-alpine-pin) for the full procedure:

                  1. Review release notes for Alpine ${VER} (busybox / musl / apk changes).
                  2. Update `ALPINE_BASE_IMAGE` in `installer/webtrees_installer/_alpine.py` to `"alpine:${VER}"`.
                  3. Run `make ci-alpine-lockstep` locally — surfaces every literal `alpine:X.Y` reference still on the old pin so it can be sed-replaced.
                  4. Run `make ci-test` for the full local CI bundle (pytest + lint + lockstep + entrypoint).
                  5. Open a PR; CI rebuilds every Alpine-derived image stage.
