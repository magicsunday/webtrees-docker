name: Check for Alpine updates

# Polls Docker Hub once a day at 12:45 UTC for new Alpine minor releases
# beyond what the installer currently pins in webtrees_installer/_alpine.py.
# A new minor needs a human review for breaking changes; the workflow only
# opens a tracking issue rather than touching the constant.
#
# Mirrors check-php.yml's "scan for new minor" logic: poll Docker Hub,
# compare against the currently-pinned minor, file an issue when something
# newer is published.

on:
    schedule:
        - cron: '45 12 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write
    actions: write

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Scan for new Alpine minor
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  # Pin is stored as `alpine:<major>.<minor>` in the
                  # installer's _alpine.py — read the literal so the workflow
                  # cannot drift from the actual constant.
                  pinned_minor=$(grep -E '^ALPINE_BASE_IMAGE\s*=' installer/webtrees_installer/_alpine.py \
                      | sed -E 's/^[^"]*"alpine:([0-9]+\.[0-9]+).*/\1/')
                  [ -n "$pinned_minor" ] || {
                      echo "::error::Could not parse Alpine pin from installer/webtrees_installer/_alpine.py" >&2
                      exit 1
                  }
                  echo "Pinned Alpine minor: ${pinned_minor}"

                  # Docker Hub library/alpine tag listing — `name=^3` keeps
                  # the response small. We look for `<major>.<minor>` tags
                  # (e.g. 3.23, 3.24), not patch tags (e.g. 3.23.4).
                  hub_response=$(curl -sf --retry 3 \
                      "https://hub.docker.com/v2/repositories/library/alpine/tags/?name=3.&page_size=100&ordering=name") \
                      || { echo "::warning::Docker Hub tag fetch failed, skipping minor scan"; exit 0; }

                  available=$(printf '%s' "$hub_response" \
                      | jq -r '.results[].name' \
                      | grep -E '^[0-9]+\.[0-9]+$' \
                      | sort -uV)

                  for ver in $available; do
                      if [ "$(printf '%s\n%s\n' "$pinned_minor" "$ver" | sort -V | head -1)" = "$pinned_minor" ] \
                          && [ "$ver" != "$pinned_minor" ]; then
                          title="Alpine ${ver} available — consider bumping installer/webtrees_installer/_alpine.py"
                          if gh issue list --state all --search "$title in:title" --json number --jq 'length' | grep -q '^0$'; then
                              gh issue create \
                                  --title "$title" \
                                  --body "Docker Hub publishes an \`alpine:${ver}\` tag that is newer than the installer's current pin (\`alpine:${pinned_minor}\`). Review the Alpine ${ver} release notes for breaking changes in busybox / musl, then bump \`webtrees_installer._alpine.ALPINE_BASE_IMAGE\` and re-run the smoke matrix."
                          fi
                      fi
                  done

    notify-on-failure:
        name: Notify on workflow failure
        needs: [check]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - name: Open tracking issue
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GH_REPO: ${{ github.repository }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
              run: |
                  set -euo pipefail
                  title="CI failure: ${{ github.workflow }} (run ${{ github.run_number }})"
                  failed_jobs=$(gh run view ${{ github.run_id }} --json jobs \
                      --jq '.jobs[] | select(.conclusion == "failure") | "- \(.name): \(.url)"')
                  body=$(cat <<BODY_END
                  Workflow **${{ github.workflow }}** failed. Triggered by \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`.

                  Run: ${RUN_URL}

                  Failed jobs:
                  ${failed_jobs}

                  Reproduce locally or inspect the run logs above. Close this issue when the underlying failure is fixed.
                  BODY_END
                  )
                  issue_url=$(gh issue create --title "$title" --body "$body")
                  echo "Issue created: $issue_url"
                  if [ -n "${COPILOT_PAT:-}" ]; then
                      if ! GH_TOKEN="${COPILOT_PAT}" gh issue edit "$issue_url" \
                              --add-assignee "copilot-swe-agent[bot]"; then
                          echo "::error::Could not assign $issue_url to Copilot. Verify (a) COPILOT_PAT has 'repo' scope (classic) or 'issues:write' + 'metadata:read' (fine-grained), (b) Copilot Coding Agent is enabled in repo settings, (c) the token has not expired."
                          exit 1
                      fi
                  else
                      echo "::notice::COPILOT_PAT secret not set — skipping Copilot auto-assignment. Add a PAT to enable hands-off triage."
                  fi
