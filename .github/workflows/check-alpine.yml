name: Check for Alpine updates

# Polls Docker Hub once a day at 12:45 UTC for new Alpine minor releases
# beyond what the installer currently pins in webtrees_installer/_alpine.py.
# A new minor needs a human review for breaking changes; the workflow only
# opens a tracking issue rather than touching the constant.
#
# Mirrors check-php.yml's "scan for new minor" logic: poll Docker Hub,
# compare against the currently-pinned minor, file an issue when something
# newer is published.

on:
    schedule:
        - cron: '45 12 * * *'
    workflow_dispatch:

permissions:
    contents: read
    issues: write
    actions: write

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Scan for new Alpine minor
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  # Reuse the parser script that ci-alpine-lockstep already
                  # exercises locally on every PR. Reading the literal pin
                  # via one shared parser keeps this workflow from drifting
                  # if a future _alpine.py reformat changes the assignment
                  # shape (Final[str], single quotes, indented).
                  # ci-alpine-lockstep enforces `alpine:X.Y` shape on every
                  # PR, so by the time this cron runs the pin is guaranteed
                  # to be `alpine:X.Y` (no patch).
                  pinned=$(./scripts/parse-alpine-pin.sh)
                  pinned_minor=${pinned#alpine:}
                  echo "Pinned Alpine minor: ${pinned_minor}"

                  # Docker Hub library/alpine tag listing. We page through
                  # every `next` link until exhausted so the scan can't
                  # miss a new minor that lands beyond an arbitrary
                  # page-size cap. The previous one-shot fetch with
                  # `ordering=name` sorted alphabetically (3.9.x lands
                  # after 3.20.x), so a new release could fall off the
                  # first 100 results and go unnoticed.
                  url="https://hub.docker.com/v2/repositories/library/alpine/tags/?name=3.&page_size=100&ordering=last_updated"
                  all_tags=""
                  while [ -n "$url" ] && [ "$url" != "null" ]; do
                      page=$(curl -sf --retry 3 "$url") || {
                          echo "::warning::Docker Hub tag fetch failed, skipping minor scan"
                          exit 0
                      }
                      # `?` + `// empty` keep jq tolerant of a future schema
                      # regression where .results is null/missing — without
                      # them, `set -euo pipefail` aborts the script mid-loop
                      # before the self-check below can fire the documented
                      # ::error:: annotation about schema changes.
                      all_tags+=$'\n'$(printf '%s' "$page" | jq -r '.results[]?.name // empty')
                      url=$(printf '%s' "$page" | jq -r '.next // empty')
                  done

                  # We look for `<major>.<minor>` tags (e.g. 3.23, 3.24),
                  # not patch tags (e.g. 3.23.4). `|| true` swallows grep's
                  # no-match exit so `set -e` + `pipefail` don't abort the
                  # script before the self-check below can fire the
                  # documented `::error::` annotation — `name=3.` filter
                  # regression and schema-change failure modes route
                  # through here.
                  available=$(printf '%s' "$all_tags" \
                      | { grep -E '^[0-9]+\.[0-9]+$' || true; } \
                      | sort -uV)

                  # Self-test: the polling can only spot newer minors if
                  # the current pin is reachable from the response. If the
                  # API query degrades (page_size cap silently lowered, the
                  # filter pattern stops matching, ordering quirk, schema
                  # change), this guard fails the workflow instead of
                  # silently shipping a green run that scanned nothing.
                  if ! printf '%s\n' "$available" | grep -qFx "$pinned_minor"; then
                      echo "::error::Pinned Alpine minor ${pinned_minor} not found in the Docker Hub tag listing. Likely causes: page_size cap silently lowered, name=3. filter regressed, ordering quirk dropping the pin mid-pagination, or response schema change. Inspect the curl output and adjust the query."
                      exit 1
                  fi

                  for ver in $available; do
                      if [ "$(printf '%s\n%s\n' "$pinned_minor" "$ver" | sort -V | head -1)" = "$pinned_minor" ] \
                          && [ "$ver" != "$pinned_minor" ]; then
                          title="Alpine ${ver} available — consider bumping installer/webtrees_installer/_alpine.py"
                          if gh issue list --state all --search "$title in:title" --json number --jq 'length' | grep -q '^0$'; then
                              gh issue create \
                                  --title "$title" \
                                  --body "Docker Hub publishes an \`alpine:${ver}\` tag that is newer than the installer's current pin (\`alpine:${pinned_minor}\`). Review the Alpine ${ver} release notes for breaking changes in busybox / musl, then bump \`webtrees_installer._alpine.ALPINE_BASE_IMAGE\` and re-run the smoke matrix."
                          fi
                      fi
                  done

    notify-on-failure:
        name: Notify on workflow failure
        needs: [check]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/notify-on-failure
              with:
                  copilot-pat: ${{ secrets.COPILOT_PAT }}
