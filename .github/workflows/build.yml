name: Build and push image

# Triggers:
#   workflow_dispatch — run manually; optionally restrict to one webtrees version
#   tag push v*       — for release tags
on:
    workflow_dispatch:
        inputs:
            webtrees_version:
                description: 'Webtrees version (e.g. 2.2.6). Empty = build every entry in dev/versions.json.'
                required: false
                type: string
    push:
        tags:
            - 'v*'

jobs:
    matrix:
        name: Build matrix
        runs-on: ubuntu-latest
        # Light job (jq over dev/versions.json + a few jq pipes); 5m
        # leaves comfortable headroom for transient slowdowns without
        # letting a hung step soak the GHA 6h default.
        timeout-minutes: 5
        outputs:
            php_entries: ${{ steps.set.outputs.php_entries }}
            nginx_base: ${{ steps.set.outputs.nginx_base }}
            nginx_tag: ${{ steps.set.outputs.nginx_tag }}
            nginx_config_revision: ${{ steps.set.outputs.nginx_config_revision }}
            installer_tag: ${{ steps.set.outputs.installer_tag }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: License drift guard
              run: |
                  # installer/LICENSE is a copy of the repo-root LICENSE (the
                  # symlink approach is not feasible because Docker COPY refuses
                  # symlinks pointing outside the build context).  Fail fast if
                  # they have drifted instead of shipping a stale wheel.
                  cmp LICENSE installer/LICENSE

            # Pipe the workflow_dispatch input through `env:` so the GHA
            # templater never inlines it into the shell line — bash reads it
            # as a normal env var and the `--arg` form of jq passes it as
            # data, not a filter fragment. Regex-validate the shape before
            # use so a malformed input fails fast with a clear annotation
            # instead of producing a confusing empty-match downstream.
            - id: set
              env:
                  WEBTREES_VERSION_INPUT: ${{ inputs.webtrees_version }}
              run: |
                  set -euo pipefail
                  if [ -n "$WEBTREES_VERSION_INPUT" ]; then
                      if [[ ! "$WEBTREES_VERSION_INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                          echo "::error::workflow_dispatch input 'webtrees_version' must match X.Y.Z"
                          exit 1
                      fi
                      php_entries=$(jq -c --arg ver "$WEBTREES_VERSION_INPUT" '[.[] | select(.webtrees == $ver)]' dev/versions.json)
                      if [ "$php_entries" = "[]" ]; then
                          echo "::error::webtrees $WEBTREES_VERSION_INPUT not present in dev/versions.json"
                          exit 1
                      fi
                  else
                      php_entries=$(jq -c . dev/versions.json)
                  fi
                  echo "php_entries=$php_entries" >> "$GITHUB_OUTPUT"
                  # Validate the shape of every value emitted as a matrix
                  # output — downstream consumers interpolate them into
                  # shell strings (image-tag suffixes, --build-arg
                  # values), so a malformed dev/*.json reaches a shell
                  # context. The ci-*-lockstep checks guard the files at
                  # commit time; this is the defence-in-depth gate at
                  # workflow runtime.
                  nginx_base=$(jq -r .nginx_base dev/nginx-version.json)
                  if [[ ! "$nginx_base" =~ ^[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::dev/nginx-version.json .nginx_base '$nginx_base' must match X.Y"
                      exit 1
                  fi
                  nginx_tag=$(jq -r .tag dev/nginx-version.json)
                  if [[ ! "$nginx_tag" =~ ^[0-9]+\.[0-9]+-r[0-9]+$ ]]; then
                      echo "::error::dev/nginx-version.json .tag '$nginx_tag' must match X.Y-rN"
                      exit 1
                  fi
                  nginx_config_revision=$(jq -r .config_revision dev/nginx-version.json)
                  if [[ ! "$nginx_config_revision" =~ ^[0-9]+$ ]]; then
                      echo "::error::dev/nginx-version.json .config_revision '$nginx_config_revision' must match N (non-negative integer)"
                      exit 1
                  fi
                  installer_tag=$(jq -r .version dev/installer-version.json)
                  if [[ ! "$installer_tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::dev/installer-version.json .version '$installer_tag' must match X.Y.Z"
                      exit 1
                  fi
                  echo "nginx_base=${nginx_base}" >> "$GITHUB_OUTPUT"
                  echo "nginx_tag=${nginx_tag}" >> "$GITHUB_OUTPUT"
                  echo "nginx_config_revision=${nginx_config_revision}" >> "$GITHUB_OUTPUT"
                  echo "installer_tag=${installer_tag}" >> "$GITHUB_OUTPUT"

    build-php:
        name: php ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }} (${{ matrix.platform.arch }})
        needs: matrix
        runs-on: ${{ matrix.platform.runner }}
        # Native single-platform build (#127): each runner builds its
        # own arch, then a manifest job stitches the per-arch tags into
        # a multi-arch manifest. 60m covers a clean composer install +
        # transitive deps with headroom for transient GHCR pushes.
        timeout-minutes: 60
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
                # Platform-matrix shape used by every build-* and smoke-test
                # job in this workflow:
                #   runner — GHA runs-on: label (native host arch).
                #   docker — buildx --platform value.
                #   arch   — tag suffix on the per-arch image AND the
                #            cache scope (so amd64 cache doesn't evict
                #            arm64 cache).
                # Adding a third arch (e.g. linux/arm/v7) needs an entry
                # here AND a matching `${base}-<arch>` source in the
                # corresponding manifest-* imagetools-create invocation —
                # those two surfaces are not coupled by tooling, drift
                # is detectable only at runtime as a missing-image error.
                platform:
                    - {runner: ubuntu-latest, docker: linux/amd64, arch: amd64}
                    - {runner: ubuntu-24.04-arm, docker: linux/arm64, arch: arm64}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # Look up the multi-arch manifest digest probe-php-digests.sh
            # recorded for this PHP minor. The build below passes it as
            # `PHP_DIGEST=...` so the Dockerfile's FROM line resolves the
            # base image by digest, not by mutable tag. A tag republish
            # between the probe and this build cannot substitute the base.
            - name: Resolve PHP base-image digest
              id: php_digest
              env:
                  PHP_MINOR: ${{ matrix.entry.php }}
              run: |
                  set -euo pipefail
                  # Regex-validate PHP_MINOR shape before using it in a
                  # grep pattern — a value like `8\.5|.*` could otherwise
                  # match unintended digest rows.
                  if [[ ! "$PHP_MINOR" =~ ^[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.php '$PHP_MINOR' must match X.Y"
                      exit 1
                  fi
                  digest=$(grep "^${PHP_MINOR}=" dev/php_digests.lock | head -n1 | cut -d= -f2-)
                  if [ -z "$digest" ]; then
                      echo "::error::dev/php_digests.lock has no entry for PHP ${PHP_MINOR}"
                      exit 1
                  fi
                  # Emit with a leading '@' so the Dockerfile FROM line can
                  # concatenate the value directly onto the tag.
                  echo "value=@${digest}" >> "$GITHUB_OUTPUT"

            - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: php-build
                  push: true
                  platforms: ${{ matrix.platform.docker }}
                  tags: ghcr.io/magicsunday/webtrees-php:${{ matrix.entry.webtrees }}-php${{ matrix.entry.php }}-${{ matrix.platform.arch }}
                  build-args: |
                      PHP_VERSION=${{ matrix.entry.php }}
                      PHP_DIGEST_REF=${{ steps.php_digest.outputs.value }}
                      WEBTREES_VERSION=${{ matrix.entry.webtrees }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                      DOCKER_SERVER=ghcr.io/magicsunday
                  cache-from: type=gha,scope=php-${{ matrix.entry.php }}-${{ matrix.platform.arch }}
                  cache-to: type=gha,mode=max,scope=php-${{ matrix.entry.php }}-${{ matrix.platform.arch }}

    manifest-php:
        name: manifest php ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }}
        needs: [matrix, build-php]
        runs-on: ubuntu-latest
        # Manifest stitching is registry-only (no buildx, no compile);
        # 10m is generous for `imagetools create` + GHCR roundtrips.
        # All build-php cells (every entry × both platforms) must finish
        # before any manifest-php cell starts — GHA `needs:` waits on
        # ALL cells of a matrix dependency by default.
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
        steps:
            # `actions/checkout` here is solely so the local composite
            # action `./.github/actions/ghcr-login` resolves; nothing
            # else in this job reads repo content. Do NOT remove it
            # thinking it is unused.
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # `tag_args` accumulates `-t <fully-qualified-tag>` pairs from
            # the primary tag plus every `matrix.entry.tags` extra
            # (e.g. `latest`, `2.2`). Every field that flows from
            # `dev/versions.json` is read via `env:` (not GHA template
            # interpolation) so the value is a normal bash variable that
            # cannot break out of the surrounding shell quoting. Each
            # extra tag is then regex-validated against
            # `^[A-Za-z0-9._-]+$` before concatenation so a malicious-
            # looking entry cannot inject extra flags into
            # imagetools-create when the line below word-splits the
            # joined string. The webtrees + php fields go through the
            # same `^[0-9]+\.[0-9]+(\.[0-9]+)?$` shape that build-php
            # consumes via the matrix-step regex.
            - name: Compute tag args
              id: tags
              env:
                  WT: ${{ matrix.entry.webtrees }}
                  PHP: ${{ matrix.entry.php }}
                  TAGS_JSON: ${{ toJson(matrix.entry.tags) }}
              run: |
                  set -euo pipefail
                  if [[ ! "$WT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.webtrees '$WT' must match X.Y.Z"
                      exit 1
                  fi
                  if [[ ! "$PHP" =~ ^[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.php '$PHP' must match X.Y"
                      exit 1
                  fi
                  primary="ghcr.io/magicsunday/webtrees-php:${WT}-php${PHP}"
                  tag_args="-t $primary"
                  while IFS= read -r extra; do
                      [ -z "$extra" ] && continue
                      if [[ ! "$extra" =~ ^[A-Za-z0-9._-]+$ ]]; then
                          echo "::error::tag value '$extra' in dev/versions.json contains chars outside [A-Za-z0-9._-]"
                          exit 1
                      fi
                      tag_args="$tag_args -t ghcr.io/magicsunday/webtrees-php:$extra"
                  done < <(jq -r '.[]' <<<"$TAGS_JSON")
                  printf 'tag_args=%s\n' "$tag_args" >> "$GITHUB_OUTPUT"

            # The `${base}-amd64` / `${base}-arm64` sources hardcode the
            # tag suffix from the build-php platform matrix. If a third
            # arch is added in the platform-matrix above, an extra
            # source line MUST be added here too — see the platform
            # comment in build-php for the coupling.
            - name: Assemble multi-arch manifest
              env:
                  WT: ${{ matrix.entry.webtrees }}
                  PHP: ${{ matrix.entry.php }}
              run: |
                  set -euo pipefail
                  base="ghcr.io/magicsunday/webtrees-php:${WT}-php${PHP}"
                  docker buildx imagetools create ${{ steps.tags.outputs.tag_args }} \
                      "${base}-amd64" \
                      "${base}-arm64"

    build-php-full:
        name: php-full ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }} (${{ matrix.platform.arch }})
        needs: matrix
        runs-on: ${{ matrix.platform.runner }}
        # Same shape + budget as build-php (single-platform native build).
        timeout-minutes: 60
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
                # Platform matrix — see build-php for the shape, the
                # runner/docker/arch field semantics, and the manifest-*
                # coupling.
                platform:
                    - {runner: ubuntu-latest, docker: linux/amd64, arch: amd64}
                    - {runner: ubuntu-24.04-arm, docker: linux/arm64, arch: arm64}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # See build-php for the digest-pin rationale; same shape here.
            - name: Resolve PHP base-image digest
              id: php_digest
              env:
                  PHP_MINOR: ${{ matrix.entry.php }}
              run: |
                  set -euo pipefail
                  # Regex-validate PHP_MINOR shape before using it in a
                  # grep pattern — a value like `8\.5|.*` could otherwise
                  # match unintended digest rows.
                  if [[ ! "$PHP_MINOR" =~ ^[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.php '$PHP_MINOR' must match X.Y"
                      exit 1
                  fi
                  digest=$(grep "^${PHP_MINOR}=" dev/php_digests.lock | head -n1 | cut -d= -f2-)
                  if [ -z "$digest" ]; then
                      echo "::error::dev/php_digests.lock has no entry for PHP ${PHP_MINOR}"
                      exit 1
                  fi
                  # Emit with a leading '@' so the Dockerfile FROM line can
                  # concatenate the value directly onto the tag.
                  echo "value=@${digest}" >> "$GITHUB_OUTPUT"

            - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: php-build-full
                  push: true
                  platforms: ${{ matrix.platform.docker }}
                  tags: ghcr.io/magicsunday/webtrees-php-full:${{ matrix.entry.webtrees }}-php${{ matrix.entry.php }}-${{ matrix.platform.arch }}
                  build-args: |
                      PHP_VERSION=${{ matrix.entry.php }}
                      PHP_DIGEST_REF=${{ steps.php_digest.outputs.value }}
                      WEBTREES_VERSION=${{ matrix.entry.webtrees }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                      DOCKER_SERVER=ghcr.io/magicsunday
                  cache-from: type=gha,scope=php-full-${{ matrix.entry.php }}-${{ matrix.platform.arch }}
                  cache-to: type=gha,mode=max,scope=php-full-${{ matrix.entry.php }}-${{ matrix.platform.arch }}

    manifest-php-full:
        name: manifest php-full ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }}
        needs: [matrix, build-php-full]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # See manifest-php for the tag_args validation contract and the
            # per-arch suffix coupling — same shape applies. Every value
            # from `dev/versions.json` reaches the shell via `env:` so
            # quoting attacks at template-substitution time can't fire.
            - name: Compute tag args
              id: tags
              env:
                  WT: ${{ matrix.entry.webtrees }}
                  PHP: ${{ matrix.entry.php }}
                  TAGS_JSON: ${{ toJson(matrix.entry.tags) }}
              run: |
                  set -euo pipefail
                  if [[ ! "$WT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.webtrees '$WT' must match X.Y.Z"
                      exit 1
                  fi
                  if [[ ! "$PHP" =~ ^[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::matrix.entry.php '$PHP' must match X.Y"
                      exit 1
                  fi
                  primary="ghcr.io/magicsunday/webtrees-php-full:${WT}-php${PHP}"
                  tag_args="-t $primary"
                  while IFS= read -r extra; do
                      [ -z "$extra" ] && continue
                      if [[ ! "$extra" =~ ^[A-Za-z0-9._-]+$ ]]; then
                          echo "::error::tag value '$extra' in dev/versions.json contains chars outside [A-Za-z0-9._-]"
                          exit 1
                      fi
                      tag_args="$tag_args -t ghcr.io/magicsunday/webtrees-php-full:$extra"
                  done < <(jq -r '.[]' <<<"$TAGS_JSON")
                  printf 'tag_args=%s\n' "$tag_args" >> "$GITHUB_OUTPUT"

            - name: Assemble multi-arch manifest
              env:
                  WT: ${{ matrix.entry.webtrees }}
                  PHP: ${{ matrix.entry.php }}
              run: |
                  set -euo pipefail
                  base="ghcr.io/magicsunday/webtrees-php-full:${WT}-php${PHP}"
                  docker buildx imagetools create ${{ steps.tags.outputs.tag_args }} \
                      "${base}-amd64" \
                      "${base}-arm64"

    build-nginx:
        name: nginx ${{ needs.matrix.outputs.nginx_tag }} (${{ matrix.platform.arch }})
        needs: matrix
        runs-on: ${{ matrix.platform.runner }}
        # Smaller build than the PHP stages (no composer) but still
        # native single-platform buildx + nginx -t at build time. 30m
        # covers it on the slower of the two runners.
        timeout-minutes: 30
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                # Platform matrix — see build-php for the shape and the
                # manifest-* per-arch coupling.
                platform:
                    - {runner: ubuntu-latest, docker: linux/amd64, arch: amd64}
                    - {runner: ubuntu-24.04-arm, docker: linux/arm64, arch: arm64}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: nginx-build
                  push: true
                  platforms: ${{ matrix.platform.docker }}
                  # nginx -t inside the build resolves the `phpfpm` upstream
                  # hostname; buildkit (since the v4 buildx bump) mounts
                  # /etc/hosts read-only, so the stub now arrives via --add-host
                  # rather than the old `echo >> /etc/hosts` workaround.
                  add-hosts: phpfpm=127.0.0.1
                  tags: ghcr.io/magicsunday/webtrees-nginx:${{ needs.matrix.outputs.nginx_tag }}-${{ matrix.platform.arch }}
                  build-args: |
                      NGINX_BASE=${{ needs.matrix.outputs.nginx_base }}
                      NGINX_CONFIG_REVISION=${{ needs.matrix.outputs.nginx_config_revision }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                  cache-from: type=gha,scope=nginx-${{ matrix.platform.arch }}
                  cache-to: type=gha,mode=max,scope=nginx-${{ matrix.platform.arch }}

    manifest-nginx:
        name: manifest nginx ${{ needs.matrix.outputs.nginx_tag }}
        needs: [matrix, build-nginx]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # nginx has a single canonical tag-shape per release (no
            # per-entry extras like webtrees-php), so the `:latest`
            # alias is hardcoded inline here rather than routed through
            # a `tags` field in dev/nginx-version.json. The asymmetry
            # versus manifest-php is intentional — webtrees-php's extras
            # vary per matrix.entry, nginx's do not. A future `:rolling`
            # or `:edge` alias also lands inline.
            - name: Assemble multi-arch manifest
              env:
                  NGINX_TAG: ${{ needs.matrix.outputs.nginx_tag }}
              run: |
                  set -euo pipefail
                  # Regex-validate the matrix output before any use —
                  # ci-nginx-tag-derivation-lockstep guards the file at
                  # commit time, but the workflow's own consumers still
                  # need a shell-level guard to keep the env+regex
                  # contract symmetric with matrix.entry.* hardening.
                  if [[ ! "$NGINX_TAG" =~ ^[0-9]+\.[0-9]+-r[0-9]+$ ]]; then
                      echo "::error::nginx_tag '$NGINX_TAG' must match X.Y-rN"
                      exit 1
                  fi
                  base="ghcr.io/magicsunday/webtrees-nginx:${NGINX_TAG}"
                  # Dual-publish on versioned tag + :latest alias.
                  docker buildx imagetools create \
                      -t "${base}" \
                      -t "ghcr.io/magicsunday/webtrees-nginx:latest" \
                      "${base}-amd64" \
                      "${base}-arm64"

    build-installer:
        name: installer ${{ needs.matrix.outputs.installer_tag }} (${{ matrix.platform.arch }})
        needs: matrix
        runs-on: ${{ matrix.platform.runner }}
        # Slim Python image build (no compiled deps); 20m comfortably
        # covers a clean build + GHCR push on either runner.
        timeout-minutes: 20
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                # Platform matrix — see build-php for the shape and the
                # manifest-* per-arch coupling.
                platform:
                    - {runner: ubuntu-latest, docker: linux/amd64, arch: amd64}
                    - {runner: ubuntu-24.04-arm, docker: linux/arm64, arch: arm64}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
              with:
                  context: .
                  file: installer/Dockerfile
                  platforms: ${{ matrix.platform.docker }}
                  push: true
                  tags: ghcr.io/magicsunday/webtrees-installer:${{ needs.matrix.outputs.installer_tag }}-${{ matrix.platform.arch }}
                  cache-from: type=gha,scope=installer-${{ matrix.platform.arch }}
                  cache-to: type=gha,scope=installer-${{ matrix.platform.arch }},mode=max

    manifest-installer:
        name: manifest installer ${{ needs.matrix.outputs.installer_tag }}
        needs: [matrix, build-installer]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/ghcr-login
              with:
                  username: ${{ github.actor }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # Same shape as manifest-nginx — single tag-set per
            # release, no per-entry extras, so `:latest` is inline.
            - name: Assemble multi-arch manifest
              env:
                  INSTALLER_TAG: ${{ needs.matrix.outputs.installer_tag }}
              run: |
                  set -euo pipefail
                  # Regex-validate before use — keeps the env+regex
                  # contract symmetric with the matrix.entry.* hardening.
                  if [[ ! "$INSTALLER_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "::error::installer_tag '$INSTALLER_TAG' must match X.Y.Z"
                      exit 1
                  fi
                  base="ghcr.io/magicsunday/webtrees-installer:${INSTALLER_TAG}"
                  # Dual-publish on versioned tag + :latest alias.
                  docker buildx imagetools create \
                      -t "${base}" \
                      -t "ghcr.io/magicsunday/webtrees-installer:latest" \
                      "${base}-amd64" \
                      "${base}-arm64"

    smoke-test:
        name: smoke ${{ matrix.edition }} ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }} (${{ matrix.platform.arch }})
        needs: [matrix, manifest-php, manifest-php-full, manifest-nginx, manifest-installer]
        runs-on: ${{ matrix.platform.runner }}
        # Smoke pulls the just-built images and brings the stack up to
        # the login probe. 30m absorbs slow first-boot bootstraps on
        # GHA's variable cold-start performance (DB schema migration +
        # AUTO_SEED). Each platform cell pulls the matching single-arch
        # variant out of the multi-arch manifest assembled by the
        # manifest-* jobs above.
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                edition: [core, full, demo, dev]
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
                # Platform-matrix subset — smoke only needs `runner` + `arch`
                # (no buildx invocation here). See build-php for the full
                # shape and the manifest-* coupling.
                platform:
                    - {runner: ubuntu-latest, arch: amd64}
                    - {runner: ubuntu-24.04-arm, arch: arm64}
        # The smoke-test runs on a fresh ubuntu-latest VM per matrix cell, so
        # /tmp/smoke is naturally isolated; the matrix-derived suffix is
        # belt-and-braces for any future migration to self-hosted runners
        # that reuse the workspace. SMOKE_PORT is the single source of truth
        # for both the installer's --port flag and the curl probe URL.
        env:
            SMOKE_DIR: /tmp/smoke-${{ matrix.edition }}-${{ matrix.entry.php }}-${{ matrix.platform.arch }}
            SMOKE_PORT: 18080
            EDITION: ${{ matrix.edition }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Run installer (non-interactive)
              env:
                  INSTALLER_TAG: ${{ needs.matrix.outputs.installer_tag }}
              run: |
                  set -euo pipefail
                  mkdir -p "${SMOKE_DIR}"
                  # WEBTREES_HELPER_IMAGE routes the wizard's internal
                  # port-probe and admin-seed helpers through the
                  # already-pulled installer image so the matrix does
                  # not hammer Docker Hub's unauthenticated quota. The
                  # composite action at .github/actions/installer-run/
                  # applies the same setting on the default-path cells.
                  installer_image="ghcr.io/magicsunday/webtrees-installer:${INSTALLER_TAG}"
                  if [ "${EDITION}" = "dev" ]; then
                      # Use the workspace that actions/checkout placed at
                      # $GITHUB_WORKSPACE — a fresh `git clone` would always
                      # pull `main` and skip any branch-under-test changes
                      # to the dev compose chain.
                      mkdir -p "${SMOKE_DIR}/repo"
                      cp -a "$GITHUB_WORKSPACE/." "${SMOKE_DIR}/repo/"
                      # --no-up keeps the cell fast: it only proves the
                      # wizard renders a usable .env (incl. the new
                      # WORK_DIR line that compose.development.yaml's
                      # bind-mount device-paths depend on). The full
                      # bring-up adds ~5-10 min of composer-install and
                      # db init for diminishing return; a future cell
                      # can cover it once the matrix budget allows.
                      docker run --rm \
                          -e WORK_DIR="${SMOKE_DIR}/repo" \
                          -e WEBTREES_HELPER_IMAGE="${installer_image}" \
                          -v "${SMOKE_DIR}/repo:/work" \
                          -v /var/run/docker.sock:/var/run/docker.sock \
                          "${installer_image}" \
                          --mode dev --non-interactive --force --no-up \
                          --proxy standalone --port "${SMOKE_PORT}" --pma-port 50011 \
                          --dev-domain "webtrees.localhost:${SMOKE_PORT}" \
                          --mariadb-root-password rootpw \
                          --mariadb-database webtrees \
                          --mariadb-user webtrees --mariadb-password devpw \
                          --local-user-id 1000 --local-user-name developer
                      test -f "${SMOKE_DIR}/repo/.env"
                      grep -q "^ENVIRONMENT=development$" "${SMOKE_DIR}/repo/.env"
                      grep -q "^COMPOSE_FILE=compose.yaml:compose.pma.yaml:compose.development.yaml:compose.publish.yaml$" "${SMOKE_DIR}/repo/.env"
                      grep -q "^LOCAL_USER_ID=1000$" "${SMOKE_DIR}/repo/.env"
                      grep -Fq "WORK_DIR=\"${SMOKE_DIR}/repo\"" "${SMOKE_DIR}/repo/.env"
                      echo "dev edition: .env rendered with expected dev-chain"
                      exit 0
                  fi
                  if [ "${EDITION}" = "demo" ]; then
                      # Demo cell exits before stack-up, so the auto-admin
                      # bootstrap is wasted work — and it would also leave a
                      # `<project>_secrets` docker volume on the runner that
                      # the cell never tears down. Keep --no-admin here.
                      docker run --rm \
                          -e WEBTREES_HELPER_IMAGE="${installer_image}" \
                          -v "${SMOKE_DIR}:/work" \
                          -v /var/run/docker.sock:/var/run/docker.sock \
                          "${installer_image}" \
                          --non-interactive --force --no-up --no-admin \
                          --edition full --demo --demo-seed 42 \
                          --proxy standalone --port "${SMOKE_PORT}"
                      test -f "${SMOKE_DIR}/demo.ged"
                      head -5 "${SMOKE_DIR}/demo.ged"
                      grep -q "^2 VERS 5.5.1$" "${SMOKE_DIR}/demo.ged"
                      echo "demo edition: demo.ged emitted (skip stack-up)"
                      exit 0
                  fi
                  echo "Default-path smoke handled by the next step (installer-run composite)."

            # Default install path: auto-admin (admin user created, random
            # password surfaced in the banner). `--no-admin` is an advanced
            # opt-out that leaves the stack at webtrees' upstream setup
            # wizard — not what we want to cover in CI smoke. The composite
            # action derives COMPOSE_PROJECT_NAME from the work-dir basename
            # so the installer's pre-seeded secrets volume matches the one
            # compose mounts on the host.
            - name: Run installer (default smoke)
              if: matrix.edition != 'dev' && matrix.edition != 'demo'
              uses: ./.github/actions/installer-run
              with:
                  work-dir: ${{ env.SMOKE_DIR }}
                  installer-tag: ${{ needs.matrix.outputs.installer_tag }}
                  args: --non-interactive --force --no-up --edition ${{ matrix.edition }} --proxy standalone --port ${{ env.SMOKE_PORT }}

            - name: Up stack
              if: matrix.edition != 'dev' && matrix.edition != 'demo'
              uses: ./.github/actions/compose-up
              with:
                  work-dir: ${{ env.SMOKE_DIR }}

            - name: Wait for nginx healthy
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  case "${EDITION:-${{ matrix.edition }}}" in
                      demo|dev)
                          echo "${EDITION:-${{ matrix.edition }}} edition: Wait for nginx healthy step skipped"
                          exit 0
                          ;;
                  esac
                  set -euo pipefail
                  # 120s rather than 60s: the smoke install now runs the
                  # full bootstrap (config-ini + schema migrate + Argon2id
                  # admin-create + admin role grant) before phpfpm execs and
                  # the healthcheck flips. On a cold runner that serial
                  # chain plus the db-healthcheck warm-up plausibly eats
                  # 30-50s; 60s left no margin once a single image had to
                  # be pulled fresh.
                  for i in $(seq 1 120); do
                      health=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q nginx)" 2>/dev/null || echo starting)
                      if [ "$health" = "healthy" ]; then
                          echo "nginx healthy after ${i}s"
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::nginx did not become healthy within 120s"
                  docker compose logs --tail=200
                  exit 1

            - name: Probe HTTP
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  case "${EDITION:-${{ matrix.edition }}}" in
                      demo|dev)
                          echo "${EDITION:-${{ matrix.edition }}} edition: Probe HTTP step skipped"
                          exit 0
                          ;;
                  esac
                  set -euo pipefail
                  # GET / lands on a tree's homepage when a tree exists; on a
                  # fresh auto-admin install there are no trees yet, so the
                  # router serves 404. Probe the login page directly — its
                  # presence proves config.ini.php was written, the schema is
                  # in place, the admin user was created, and routes resolve.
                  #
                  # X-Forwarded-Proto: https tells nginx the upstream already
                  # terminated TLS, bypassing the enforce-https 301 redirect
                  # that ENFORCE_HTTPS=TRUE (the post-#35 default) emits on
                  # plain HTTP. Without the header, curl -L would follow the
                  # 301 to https://localhost:443 and fail with "Failed to
                  # connect to localhost port 443". Matches the runtime
                  # healthcheck pattern in compose.*.j2 / compose.yaml.
                  body=$(curl -fsSL -H 'X-Forwarded-Proto: https' \
                      "http://localhost:${SMOKE_PORT}/index.php?route=/login")
                  # head -50 closes the pipe after the 50th line; without the
                  # `|| true` the resulting SIGPIPE on `printf` would trip
                  # `set -o pipefail` and fail the step before grep even runs.
                  printf '%s\n' "$body" | head -50 || true
                  # Here-string instead of a pipe so grep's early stdin-close
                  # on first match cannot deliver SIGPIPE upstream. A previous
                  # `if ! printf … | grep` form looked equivalent in local
                  # testing but tripped CI's pipefail anyway — there is no
                  # producer process to SIGPIPE when the source is `<<<`.
                  if ! grep -qi "sign in" <<< "$body"; then
                      echo "::error::response body does not contain a sign-in form"
                      exit 1
                  fi

            - name: Tear down
              if: always()
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  case "${EDITION:-${{ matrix.edition }}}" in
                      demo|dev)
                          echo "${EDITION:-${{ matrix.edition }}} edition: Tear down step skipped"
                          exit 0
                          ;;
                  esac
                  docker compose down -v

    demo-import-e2e:
        name: demo-import E2E
        needs: [matrix, smoke-test]
        # Single-arch E2E on amd64 to keep matrix budget reasonable;
        # arm64 import coverage falls out of the smoke-test matrix.
        runs-on: ubuntu-latest
        # Full stack-up + GEDCOM import; 30m absorbs the slow first-boot
        # bootstrap (DB schema migration + AUTO_SEED + admin user) before
        # the import even starts.
        timeout-minutes: 30
        # The smoke-test matrix's demo cell only proves the wizard emits
        # demo.ged with the right GEDCOM header; the actual tree-import CLI
        # path needs a running stack with a healthy DB and a populated
        # data/config.ini.php (which only the admin-bootstrap writes).
        # E2E_PORT is the single source of truth for both the installer's
        # --port flag and the published listener.
        env:
            E2E_DIR: /tmp/demo-import-e2e
            E2E_PORT: 18181
            INSTALLER_TAG: ${{ needs.matrix.outputs.installer_tag }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - name: Prepare work-dir
              run: mkdir -p "${E2E_DIR}"

            # Admin-bootstrap is required: without WT_ADMIN_USER the phpfpm
            # entrypoint does not write data/config.ini.php, and the webtrees
            # CLI cannot reach the database without it. The composite action
            # handles COMPOSE_PROJECT_NAME so the pre-seeded secrets volume
            # aligns with the volume compose mounts on the host.
            - name: Render stack via wizard
              uses: ./.github/actions/installer-run
              with:
                  work-dir: ${{ env.E2E_DIR }}
                  installer-tag: ${{ env.INSTALLER_TAG }}
                  args: --non-interactive --force --no-up --edition full --demo --demo-seed 42 --proxy standalone --port ${{ env.E2E_PORT }} --admin-user e2e --admin-email e2e@example.org

            - name: Verify demo.ged emitted
              run: test -f "${E2E_DIR}/demo.ged"

            - name: Bring stack up
              uses: ./.github/actions/compose-up
              with:
                  work-dir: ${{ env.E2E_DIR }}

            - name: Wait for db + phpfpm healthy (120s budget)
              working-directory: ${{ env.E2E_DIR }}
              run: |
                  set -euo pipefail
                  # mariadb takes ~30-60s to finish first-boot schema init;
                  # phpfpm waits for db-healthy then runs the admin-bootstrap
                  # (config-ini + schema migration + user-create). Nginx is
                  # intentionally NOT gated on here: until a tree is imported
                  # webtrees returns 404 on /, so the nginx healthcheck stays
                  # unhealthy even when the stack is fully usable for CLI.
                  for i in $(seq 1 120); do
                      db_h=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q db)" 2>/dev/null || echo starting)
                      phpfpm_h=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q phpfpm)" 2>/dev/null || echo starting)
                      if [ "$db_h" = "healthy" ] && [ "$phpfpm_h" = "healthy" ]; then
                          echo "stack ready after ${i}s (db + phpfpm healthy)"
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::stack did not become ready within 120s (db=$db_h phpfpm=$phpfpm_h)"
                  docker compose logs --tail=200
                  exit 1

            - name: Copy GEDCOM + create + import demo tree
              working-directory: ${{ env.E2E_DIR }}
              run: |
                  set -euo pipefail
                  docker compose cp demo.ged phpfpm:/tmp/demo.ged
                  # `tree --create` requires --title; the launcher lives at
                  # public/index.php and must be invoked as www-data so it can
                  # read data/config.ini.php (mode 0640, owner www-data).
                  docker compose exec -T phpfpm su www-data -s /bin/sh -c \
                      "cd /var/www/html && php public/index.php tree --create demo --title 'Demo Tree'"
                  docker compose exec -T phpfpm su www-data -s /bin/sh -c \
                      "cd /var/www/html && php public/index.php tree-import demo /tmp/demo.ged"

            - name: Assert demo tree imported
              working-directory: ${{ env.E2E_DIR }}
              run: |
                  set -euo pipefail
                  # tree-list --format=json emits one object per tree with
                  # name + imported fields; jq -e exits non-zero if no entry
                  # matches, which also proves the import (not just create)
                  # ran. The ASCII table form was ambiguous: `demo` lives in
                  # column 2 (Name), not column 1 (ID), so a `^| demo `
                  # anchor never matched.
                  output=$(docker compose exec -T phpfpm su www-data -s /bin/sh -c \
                      "cd /var/www/html && php public/index.php tree-list --format=json")
                  printf '%s\n' "$output"
                  if ! jq -e 'any(.[]; .name == "demo" and .imported == "yes")' <<< "$output" >/dev/null; then
                      echo "::error::tree-list output does not contain an imported 'demo' tree"
                      exit 1
                  fi

            - name: Tear down
              if: always()
              working-directory: ${{ env.E2E_DIR }}
              run: docker compose down -v

    notify-on-failure:
        name: Notify on workflow failure
        # IMPORTANT: keep this `needs:` list in sync with every other job
        # in the workflow. GHA has no glob for `needs:`, so a missing entry
        # silently disables failure notification for that job.
        needs: [matrix, build-php, build-php-full, build-nginx, build-installer, manifest-php, manifest-php-full, manifest-nginx, manifest-installer, smoke-test, demo-import-e2e]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            issues: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/notify-on-failure
              with:
                  copilot-pat: ${{ secrets.COPILOT_PAT }}
