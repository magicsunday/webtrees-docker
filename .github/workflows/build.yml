name: Build and push image

# Triggers:
#   workflow_dispatch — run manually; optionally restrict to one webtrees version
#   tag push v*       — for release tags
on:
    workflow_dispatch:
        inputs:
            webtrees_version:
                description: 'Webtrees version (e.g. 2.2.6). Empty = build every entry in dev/versions.json.'
                required: false
                type: string
    push:
        tags:
            - 'v*'

jobs:
    matrix:
        name: Build matrix
        runs-on: ubuntu-latest
        outputs:
            entries: ${{ steps.set.outputs.entries }}
        steps:
            - uses: actions/checkout@v4

            - id: set
              run: |
                  set -euo pipefail
                  if [ -n "${{ inputs.webtrees_version }}" ]; then
                      entries=$(jq -c "[.[] | select(.webtrees == \"${{ inputs.webtrees_version }}\")]" dev/versions.json)
                      if [ "$entries" = "[]" ]; then
                          echo "::error::webtrees ${{ inputs.webtrees_version }} not present in dev/versions.json"
                          exit 1
                      fi
                  else
                      entries=$(jq -c . dev/versions.json)
                  fi
                  echo "entries=$entries" >> "$GITHUB_OUTPUT"

    build:
        name: ${{ matrix.entry.webtrees }} (php ${{ matrix.entry.php }})
        needs: matrix
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.entries) }}
        steps:
            - uses: actions/checkout@v4

            - uses: docker/setup-qemu-action@v3

            - uses: docker/setup-buildx-action@v3

            - uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute tag list
              id: tags
              run: |
                  set -euo pipefail
                  primary="ghcr.io/magicsunday/webtrees/php:${{ matrix.entry.webtrees }}-php${{ matrix.entry.php }}"
                  tags="$primary"
                  for extra in $(jq -r '.[]' <<<'${{ toJson(matrix.entry.tags) }}'); do
                      tags="$tags,ghcr.io/magicsunday/webtrees/php:$extra"
                  done
                  printf 'tags=%s\n' "$tags" >> "$GITHUB_OUTPUT"

            - uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  target: php-build
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.tags.outputs.tags }}
                  build-args: |
                      PHP_VERSION=${{ matrix.entry.php }}
                      WEBTREES_VERSION=${{ matrix.entry.webtrees }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                      DOCKER_SERVER=ghcr.io/magicsunday
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
