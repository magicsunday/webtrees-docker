name: Build and push image

# Triggers:
#   workflow_dispatch — run manually; optionally restrict to one webtrees version
#   tag push v*       — for release tags
on:
    workflow_dispatch:
        inputs:
            webtrees_version:
                description: 'Webtrees version (e.g. 2.2.6). Empty = build every entry in dev/versions.json.'
                required: false
                type: string
    push:
        tags:
            - 'v*'

jobs:
    matrix:
        name: Build matrix
        runs-on: ubuntu-latest
        outputs:
            php_entries: ${{ steps.set.outputs.php_entries }}
            nginx_tag: ${{ steps.set.outputs.nginx_tag }}
            nginx_config_revision: ${{ steps.set.outputs.nginx_config_revision }}
            installer_tag: ${{ steps.set.outputs.installer_tag }}
        steps:
            - uses: actions/checkout@v6

            - name: License drift guard
              run: |
                  # installer/LICENSE is a copy of the repo-root LICENSE (the
                  # symlink approach is not feasible because Docker COPY refuses
                  # symlinks pointing outside the build context).  Fail fast if
                  # they have drifted instead of shipping a stale wheel.
                  cmp LICENSE installer/LICENSE

            - id: set
              run: |
                  set -euo pipefail
                  if [ -n "${{ inputs.webtrees_version }}" ]; then
                      php_entries=$(jq -c "[.[] | select(.webtrees == \"${{ inputs.webtrees_version }}\")]" dev/versions.json)
                      if [ "$php_entries" = "[]" ]; then
                          echo "::error::webtrees ${{ inputs.webtrees_version }} not present in dev/versions.json"
                          exit 1
                      fi
                  else
                      php_entries=$(jq -c . dev/versions.json)
                  fi
                  echo "php_entries=$php_entries" >> "$GITHUB_OUTPUT"
                  echo "nginx_tag=$(jq -r .tag dev/nginx-version.json)" >> "$GITHUB_OUTPUT"
                  echo "nginx_config_revision=$(jq -r .config_revision dev/nginx-version.json)" >> "$GITHUB_OUTPUT"
                  installer_tag=$(jq -r .tag dev/installer-version.json)
                  echo "installer_tag=${installer_tag}" >> "$GITHUB_OUTPUT"

    build-php:
        name: php ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }}
        needs: matrix
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
        steps:
            - uses: actions/checkout@v6
            - uses: docker/setup-qemu-action@v4
            - uses: docker/setup-buildx-action@v4
            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute tag list
              id: tags
              run: |
                  set -euo pipefail
                  primary="ghcr.io/magicsunday/webtrees/php:${{ matrix.entry.webtrees }}-php${{ matrix.entry.php }}"
                  tags="$primary"
                  for extra in $(jq -r '.[]' <<<'${{ toJson(matrix.entry.tags) }}'); do
                      tags="$tags,ghcr.io/magicsunday/webtrees/php:$extra"
                  done
                  printf 'tags=%s\n' "$tags" >> "$GITHUB_OUTPUT"

            - uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: php-build
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.tags.outputs.tags }}
                  build-args: |
                      PHP_VERSION=${{ matrix.entry.php }}
                      WEBTREES_VERSION=${{ matrix.entry.webtrees }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                      DOCKER_SERVER=ghcr.io/magicsunday
                  cache-from: type=gha,scope=php-${{ matrix.entry.php }}
                  cache-to: type=gha,mode=max,scope=php-${{ matrix.entry.php }}

    build-php-full:
        name: php-full ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }}
        needs: matrix
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
        steps:
            - uses: actions/checkout@v6
            - uses: docker/setup-qemu-action@v4
            - uses: docker/setup-buildx-action@v4
            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute tag list
              id: tags
              run: |
                  set -euo pipefail
                  primary="ghcr.io/magicsunday/webtrees/php-full:${{ matrix.entry.webtrees }}-php${{ matrix.entry.php }}"
                  tags="$primary"
                  for extra in $(jq -r '.[]' <<<'${{ toJson(matrix.entry.tags) }}'); do
                      tags="$tags,ghcr.io/magicsunday/webtrees/php-full:$extra"
                  done
                  printf 'tags=%s\n' "$tags" >> "$GITHUB_OUTPUT"

            - uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: php-build-full
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.tags.outputs.tags }}
                  build-args: |
                      PHP_VERSION=${{ matrix.entry.php }}
                      WEBTREES_VERSION=${{ matrix.entry.webtrees }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                      DOCKER_SERVER=ghcr.io/magicsunday
                  cache-from: type=gha,scope=php-full-${{ matrix.entry.php }}
                  cache-to: type=gha,mode=max,scope=php-full-${{ matrix.entry.php }}

    build-nginx:
        name: nginx ${{ needs.matrix.outputs.nginx_tag }}
        needs: matrix
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6
            - uses: docker/setup-qemu-action@v4
            - uses: docker/setup-buildx-action@v4
            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  target: nginx-build
                  push: true
                  platforms: linux/amd64,linux/arm64
                  # nginx -t inside the build resolves the `phpfpm` upstream
                  # hostname; buildkit (since the v4 buildx bump) mounts
                  # /etc/hosts read-only, so the stub now arrives via --add-host
                  # rather than the old `echo >> /etc/hosts` workaround.
                  add-hosts: phpfpm=127.0.0.1
                  tags: |
                      ghcr.io/magicsunday/webtrees/nginx:${{ needs.matrix.outputs.nginx_tag }}
                      ghcr.io/magicsunday/webtrees/nginx:latest
                  build-args: |
                      NGINX_CONFIG_REVISION=${{ needs.matrix.outputs.nginx_config_revision }}
                      VCS_REF=${{ github.sha }}
                      BUILD_DATE=${{ github.event.repository.updated_at }}
                  cache-from: type=gha,scope=nginx
                  cache-to: type=gha,mode=max,scope=nginx

    build-installer:
        name: installer ${{ needs.matrix.outputs.installer_tag }}
        needs: matrix
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-qemu-action@v4
            - uses: docker/setup-buildx-action@v4

            - uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: installer/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ghcr.io/magicsunday/webtrees/installer:${{ needs.matrix.outputs.installer_tag }}
                      ghcr.io/magicsunday/webtrees/installer:latest
                  cache-from: type=gha,scope=installer
                  cache-to: type=gha,scope=installer,mode=max

    smoke-test:
        name: smoke ${{ matrix.edition }} ${{ matrix.entry.webtrees }}-${{ matrix.entry.php }}
        needs: [matrix, build-php, build-php-full, build-nginx, build-installer]
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                edition: [core, full, demo]
                entry: ${{ fromJson(needs.matrix.outputs.php_entries) }}
        # The smoke-test runs on a fresh ubuntu-latest VM per matrix cell, so
        # /tmp/smoke is naturally isolated; the matrix-derived suffix is
        # belt-and-braces for any future migration to self-hosted runners
        # that reuse the workspace. SMOKE_PORT is the single source of truth
        # for both the installer's --port flag and the curl probe URL.
        env:
            SMOKE_DIR: /tmp/smoke-${{ matrix.edition }}-${{ matrix.entry.php }}
            SMOKE_PORT: 18080
            EDITION: ${{ matrix.edition }}
        steps:
            - uses: actions/checkout@v6

            - name: Run installer (non-interactive)
              env:
                  INSTALLER_TAG: ${{ needs.matrix.outputs.installer_tag }}
              run: |
                  set -euo pipefail
                  mkdir -p "${SMOKE_DIR}"
                  if [ "${EDITION}" = "demo" ]; then
                      docker run --rm \
                          -v "${SMOKE_DIR}:/work" \
                          -v /var/run/docker.sock:/var/run/docker.sock \
                          "ghcr.io/magicsunday/webtrees/installer:${INSTALLER_TAG}" \
                          --non-interactive --force --no-up --no-admin \
                          --edition full --demo --demo-seed 42 \
                          --proxy standalone --port "${SMOKE_PORT}"
                      test -f "${SMOKE_DIR}/demo.ged"
                      head -5 "${SMOKE_DIR}/demo.ged"
                      grep -q "^2 VERS 5.5.1$" "${SMOKE_DIR}/demo.ged"
                      echo "demo edition: demo.ged emitted (skip stack-up)"
                      exit 0
                  fi
                  docker run --rm \
                      -v "${SMOKE_DIR}:/work" \
                      -v /var/run/docker.sock:/var/run/docker.sock \
                      "ghcr.io/magicsunday/webtrees/installer:${INSTALLER_TAG}" \
                      --non-interactive --force --no-up --no-admin \
                      --edition "${EDITION}" --proxy standalone --port "${SMOKE_PORT}"

            - name: Up stack
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  if [ "${EDITION:-${{ matrix.edition }}}" = "demo" ]; then
                      echo "demo edition: Up stack step skipped"
                      exit 0
                  fi
                  docker compose up -d

            - name: Wait for nginx healthy
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  if [ "${EDITION:-${{ matrix.edition }}}" = "demo" ]; then
                      echo "demo edition: Wait for nginx healthy step skipped"
                      exit 0
                  fi
                  set -euo pipefail
                  for i in $(seq 1 60); do
                      health=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q nginx)" 2>/dev/null || echo starting)
                      if [ "$health" = "healthy" ]; then
                          echo "nginx healthy after ${i}s"
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::nginx did not become healthy within 60s"
                  docker compose logs --tail=200
                  exit 1

            - name: Probe HTTP
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  if [ "${EDITION:-${{ matrix.edition }}}" = "demo" ]; then
                      echo "demo edition: Probe HTTP step skipped"
                      exit 0
                  fi
                  set -euo pipefail
                  body=$(curl -fsSL "http://localhost:${SMOKE_PORT}/")
                  # head -50 closes the pipe after the 50th line; without the
                  # `|| true` the resulting SIGPIPE on `printf` would trip
                  # `set -o pipefail` and fail the step before grep even runs.
                  printf '%s\n' "$body" | head -50 || true
                  # Here-string instead of a pipe so grep's early stdin-close
                  # on first match cannot deliver SIGPIPE upstream. A previous
                  # `if ! printf … | grep` form looked equivalent in local
                  # testing but tripped CI's pipefail anyway — there is no
                  # producer process to SIGPIPE when the source is `<<<`.
                  if ! grep -qi "webtrees" <<< "$body"; then
                      echo "::error::response body does not mention 'webtrees'"
                      exit 1
                  fi

            - name: Tear down
              if: always()
              working-directory: ${{ env.SMOKE_DIR }}
              run: |
                  if [ "${EDITION:-${{ matrix.edition }}}" = "demo" ]; then
                      echo "demo edition: Tear down step skipped"
                      exit 0
                  fi
                  docker compose down -v
