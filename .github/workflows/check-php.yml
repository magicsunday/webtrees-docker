name: Check for PHP updates

# Polls Docker Hub once a day at 12:30 UTC:
#   - For every PHP minor in dev/versions.json, compare the current
#     library/php:X.Y-fpm-alpine digest against dev/php_digests.lock.
#     Any change (e.g. 8.5.6 → 8.5.7 patch release) triggers a
#     full-matrix rebuild + lockfile bump.
#   - Separately, scan Docker Hub for PHP minor tags newer than
#     max(versions.json's PHP entries). New minors (8.6, 9.0, …) need
#     a human review for breaking changes; the workflow only opens an
#     issue rather than touching versions.json.

on:
    schedule:
        - cron: '30 12 * * *'
    workflow_dispatch:

# Least privilege for the default GITHUB_TOKEN: the only GITHUB_TOKEN
# step left is the new-minor scan filing issues (issues: write); the
# checkout needs contents: read. The lockfile push, PR create/merge and
# build dispatch all run under COPILOT_PAT (see the landing step), whose
# own scopes govern them — so the former contents: write / actions:
# write grants are dead and dropped.
permissions:
    contents: read
    issues: write

# Serialise overlapping runs so a manual workflow_dispatch cannot race
# the daily cron in the orphan-branch-delete window of
# land-php-digest-bump.sh: two simultaneous runs on the same
# content-hash branch could observe the same pre-`gh pr create` window
# and one would force-delete the other's freshly pushed branch. Mirrors
# check-versions.yml.
concurrency:
    group: check-php
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        # Default job timeout is 6h; a GHCR / Docker Hub hang would burn
        # the full window before the next cron iteration. 20m covers a
        # normal digest probe with headroom for transient slowdowns.
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false

            - name: Probe current PHP digests
              id: digests
              run: |
                  set -euo pipefail
                  ./scripts/workflow/probe-php-digests.sh

            - name: Land lockfile bump via PR + auto-merge
              if: steps.digests.outputs.lockfile_dirty == 'true'
              env:
                  # A repo-scoped PAT, NOT GITHUB_TOKEN. main's branch
                  # protection requires the `ci-test aggregate` status check,
                  # which a GITHUB_TOKEN push to main can never carry, so the
                  # old direct push is declined (GH-166/167). Routing through a
                  # PR fixes that — but a GITHUB_TOKEN-authored PR is blocked by
                  # the "Actions may create PRs" org setting AND does not
                  # trigger the pull_request CI the required check depends on.
                  # A PAT push opens a PR whose CI actually runs, so auto-merge
                  # can land it. Reuses the same secret as notify-on-failure.
                  GH_TOKEN: ${{ secrets.COPILOT_PAT }}
                  HAS_CHANGES: ${{ steps.digests.outputs.changes != '' }}
              run: |
                  set -euo pipefail
                  ./scripts/workflow/land-php-digest-bump.sh

            - name: Scan for new PHP minor
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  max_known=$(jq -r '.[].php' dev/versions.json | sort -V | tail -1)

                  # Docker Hub polling + filter + pin-self-test all live
                  # in `scripts/workflow/check-docker-hub-minor.sh`, shared with
                  # the alpine/mariadb/nginx cron workflows. PHP-specific
                  # variants:
                  #   STRIP_SUFFIX=-fpm-alpine$ drops the suffix so the
                  #                            result compares directly
                  #                            against versions.json's
                  #                            `.php` values.
                  #   ORDERING=name             keeps the response stable
                  #                            even when patch tags churn
                  #                            the default last_updated
                  #                            ordering; the X.Y-fpm-alpine
                  #                            set is sparse enough that a
                  #                            single page suffices.
                  # ALLOW_MISSING_PIN=1 because `max_known` is derived
                  # from `max(versions.json)`, which CAN lead upstream
                  # by design (seed a planned future release into the
                  # catalog before its `php:X.Y-fpm-alpine` tag is
                  # published). The other callers (alpine/mariadb/
                  # nginx) keep the strict self-test because their
                  # pins come from canonical source files that never
                  # lead upstream by repo convention.
                  available=$(REPO_NAME=php \
                      NAME_FILTER=-fpm-alpine \
                      REGEX='^[0-9]+\.[0-9]+-fpm-alpine$' \
                      STRIP_SUFFIX='-fpm-alpine$' \
                      ORDERING=name \
                      PINNED_MINOR="$max_known" \
                      ALLOW_MISSING_PIN=1 \
                      ./scripts/workflow/check-docker-hub-minor.sh)

                  for ver in $available; do
                      if [ "$(printf '%s\n%s\n' "$max_known" "$ver" | sort -V | head -1)" = "$max_known" ] \
                          && [ "$ver" != "$max_known" ]; then
                          title="PHP ${ver} available — consider adding to dev/versions.json"
                          body="Docker Hub ships a \`php:${ver}-fpm-alpine\` tag that is newer than the highest version currently tracked (\`${max_known}\`). Adding it to dev/versions.json bumps the build matrix to cover the new minor. Review for breaking changes before merging."
                          TITLE="$title" BODY="$body" ./scripts/workflow/file-bump-issue.sh
                      fi
                  done

    notify-on-failure:
        name: Notify on workflow failure
        needs: [check]
        if: failure() && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            issues: write
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
              with:
                  persist-credentials: false
            - uses: ./.github/actions/notify-on-failure
              with:
                  copilot-pat: ${{ secrets.COPILOT_PAT }}
