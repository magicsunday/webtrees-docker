name: webtrees

# Persistent volumes for data storage
volumes:
    # Stores the Webtrees application files (composer-installed). Also
    # holds runtime state (config.ini.php, cache) which is re-seedable —
    # only media must survive a volume wipe.
    app:
    # Stores media files uploaded to webtrees (photos, documents). The
    # only path end-users typically need to back up or bind-mount.
    media:
    # Stores the MariaDB database files
    database:

services:
    # MariaDB database service
    # This container runs the database that stores all Webtrees data
    db:
        image: mariadb:11.7
        restart: unless-stopped
        environment:
            # Database credentials and configuration
            # These values are loaded from the .env file
            - MARIADB_ROOT_PASSWORD
            - MARIADB_DATABASE
            - MARIADB_USER
            - MARIADB_PASSWORD
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        volumes:
            - database:/var/lib/mysql
            # System timezone configuration
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - default

    # PHP-FPM service
    # This container runs the PHP interpreter with all required extensions for Webtrees.
    # The base config is image-only (production): `docker compose pull && up` is enough.
    # compose.development.yaml adds a `build:` block so contributors can rebuild locally.
    phpfpm:
        depends_on:
            db:
                condition: service_healthy
        image: ${DOCKER_SERVER}/webtrees/php:${PHP_VERSION}
        environment:
            # Application environment (production, development)
            - ENVIRONMENT
            # Whether to enforce HTTPS (TRUE/FALSE)
            - ENFORCE_HTTPS
            # UID/GID for media file ownership (set by scripts/setup.sh, optional)
            - LOCAL_USER_ID=${LOCAL_USER_ID:-}
            - LOCAL_GROUP_ID=${LOCAL_GROUP_ID:-}
            # Seed /var/www from bundled webtrees release on first run.
            # Disabled in compose.development.yaml so dev bind-mounts of ./app
            # are never overwritten.
            - WEBTREES_AUTO_SEED=true
            - WEBTREES_VERSION
            # PHP configuration settings
            - PHP_MAX_EXECUTION_TIME
            - PHP_MAX_INPUT_VARS
            - PHP_MEMORY_LIMIT
            - PHP_POST_MAX_SIZE
            - PHP_UPLOAD_MAX_FILESIZE
            # Mail server configuration
            - MAIL_SMTP
            - MAIL_DOMAIN
            - MAIL_HOST
        healthcheck:
            test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 3
            start_period: 5s
        restart: unless-stopped
        volumes:
            # System timezone configuration
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            # Application source + media storage
            - app:/var/www/html
            - media:/var/www/html/data/media
        networks:
            - default

    # Nginx web server
    # This container serves the Webtrees web application and handles HTTP requests.
    # Host port publishing is handled via the compose.publish.yaml overlay so
    # `ports:` is never merged into stacks that route through Traefik (Compose's
    # ports list merging is unreliable with `ports: []` overrides).
    nginx:
        depends_on:
            phpfpm:
                condition: service_healthy
        image: nginx:1.28-alpine
        environment:
            # Whether to enforce HTTPS (TRUE/FALSE)
            - ENFORCE_HTTPS
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost/ -o /dev/null || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s
        restart: unless-stopped
        volumes:
            # Application source + media storage (read-only for web server)
            - app:/var/www/html:ro
            - media:/var/www/html/data/media:ro
            # System timezone configuration
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            # Nginx configuration files
            - ./rootfs/etc/nginx/templates:/etc/nginx/templates:ro
            - ./rootfs/etc/nginx/includes/enforce-https.conf:/etc/nginx/includes/enforce-https.conf:ro
            - ./rootfs/etc/nginx/includes/php-proxy.conf:/etc/nginx/includes/php-proxy.conf:ro
            - ./rootfs/etc/nginx/includes/security-headers-map.conf:/etc/nginx/includes/security-headers-map.conf:ro
            - ./rootfs/etc/nginx/includes/security-headers.conf:/etc/nginx/includes/security-headers.conf:ro
            - ./rootfs/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - default

# Network configuration
networks:
    # Default network for container communication
    default:
