name: webtrees

# Persistent volumes for data storage
volumes:
    # Stores the Webtrees application files (composer-installed). Also
    # holds runtime state (config.ini.php, cache) which is re-seedable —
    # only media must survive a volume wipe.
    app:
    # Stores media files uploaded to webtrees (photos, documents). The
    # only path end-users typically need to back up or bind-mount.
    media:
    # Stores the MariaDB database files
    database:

services:
    # MariaDB database service
    # This container runs the database that stores all Webtrees data
    db:
        image: mariadb:11.8
        restart: unless-stopped
        environment:
            # Database credentials and configuration
            # These values are loaded from the .env file
            - MARIADB_ROOT_PASSWORD
            - MARIADB_DATABASE
            - MARIADB_USER
            - MARIADB_PASSWORD
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        volumes:
            - database:/var/lib/mysql
            # System timezone configuration
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - default

    # PHP-FPM service
    # This container runs the PHP interpreter with all required extensions for Webtrees.
    # The base config is image-only (production): `docker compose pull && up` is enough.
    # compose.development.yaml adds a `build:` block so contributors can rebuild locally.
    phpfpm:
        depends_on:
            db:
                condition: service_healthy
        image: ${DOCKER_SERVER}/webtrees-php:${PHP_VERSION}
        environment:
            # Application environment (production, development)
            - ENVIRONMENT
            # Whether to enforce HTTPS (TRUE/FALSE)
            - ENFORCE_HTTPS
            # UID/GID for media file ownership (set by the installer wizard, optional)
            - LOCAL_USER_ID=${LOCAL_USER_ID:-}
            - LOCAL_GROUP_ID=${LOCAL_GROUP_ID:-}
            # Seed /var/www from bundled webtrees release on first run.
            # Disabled in compose.development.yaml so dev bind-mounts of ./app
            # are never overwritten.
            - WEBTREES_AUTO_SEED=true
            - WEBTREES_VERSION
            # Database connection (consumed by config.ini.php and the
            # headless bootstrap hook). MARIADB_PASSWORD is required when
            # WT_ADMIN_USER is set; MARIADB_PASSWORD_FILE is honoured if
            # present.
            - MARIADB_HOST=${MARIADB_HOST:-db}
            - MARIADB_PORT=${MARIADB_PORT:-3306}
            - MARIADB_DATABASE
            - MARIADB_USER
            - MARIADB_PASSWORD=${MARIADB_PASSWORD:-}
            - MARIADB_PASSWORD_FILE=${MARIADB_PASSWORD_FILE:-}
            - WEBTREES_TABLE_PREFIX=${WEBTREES_TABLE_PREFIX:-wt_}
            # Pretty-URL toggle. Entrypoint forwards 1 → --rewrite-urls,
            # 0 → --no-rewrite-urls to webtrees' config-ini CLI; anything
            # else keeps the on-disk default.
            - WEBTREES_REWRITE_URLS=${WEBTREES_REWRITE_URLS:-0}
            # Headless admin bootstrap (opt-in; entrypoint is a no-op when
            # WT_ADMIN_USER is empty and the browser-side setup wizard runs).
            - WT_ADMIN_USER=${WT_ADMIN_USER:-}
            - WT_ADMIN_PASSWORD=${WT_ADMIN_PASSWORD:-}
            - WT_ADMIN_PASSWORD_FILE=${WT_ADMIN_PASSWORD_FILE:-}
            - WT_ADMIN_EMAIL=${WT_ADMIN_EMAIL:-}
            - WT_ADMIN_REAL_NAME=${WT_ADMIN_REAL_NAME:-}
            # PHP configuration settings
            - PHP_MAX_EXECUTION_TIME
            - PHP_MAX_INPUT_VARS
            - PHP_MEMORY_LIMIT
            - PHP_POST_MAX_SIZE
            - PHP_UPLOAD_MAX_FILESIZE
            # SMTP configuration. WT_SMTP_* drives webtrees' built-in
            # SMTP transport via the site_setting table (Symfony Mailer:
            # auth + STARTTLS + connection pooling). Used for every
            # Core mail surface — registration verification, password
            # reset, contact form, watch-list, approval notices.
            # See docs/env-vars.md for the full env-var inventory.
            - WT_SMTP_HOST
            - WT_SMTP_PORT
            - WT_SMTP_HELO
            - WT_SMTP_FROM_NAME
            - WT_SMTP_AUTH_USER
            - WT_SMTP_AUTH_PASSWORD
            - WT_SMTP_AUTH_PASSWORD_FILE
            - WT_SMTP_SSL
        healthcheck:
            test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 3
            # 45s rather than 5s: the entrypoint runs the seed step, the
            # config-ini write, the schema migration, and (when enabled)
            # the admin-bootstrap chain BEFORE php-fpm itself is exec'd.
            # On a CI runner with a cold image cache that sequence can
            # eat 20-30s; 5s left no headroom and compose-up `Waiting`
            # tripped to `unhealthy` while php-fpm was still finishing
            # the bootstrap. 45s + (3 × 5s) = 60s total grace.
            start_period: 45s
        restart: unless-stopped
        volumes:
            # System timezone configuration
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
            # Application source + media storage
            - app:/var/www/html
            - media:/var/www/html/data/media
        networks:
            - default

    # Nginx web server
    # Pulls the pre-baked webtrees-nginx image. For live config edits during
    # development, compose.development.yaml rebuilds nginx from source AND
    # bind-mounts ./rootfs/etc/nginx/ writable on top.
    # Host port publishing lives in compose.publish.yaml so `ports:` is never
    # merged into stacks that route through Traefik.
    nginx:
        depends_on:
            phpfpm:
                condition: service_healthy
        image: ${DOCKER_SERVER}/webtrees-nginx:${WEBTREES_NGINX_VERSION}
        environment:
            - ENFORCE_HTTPS
            # Optional extension of the X-Forwarded-Proto trust gate's
            # CIDR set. Comma-separated; empty by default so only the
            # baked conservative CIDRs (127.0.0.0/8, ::1/128, 172.16.0.0/12,
            # fc00::/7) apply. See docs/customizing.md.
            - NGINX_TRUSTED_PROXIES=${NGINX_TRUSTED_PROXIES:-}
        healthcheck:
            # Probe the login page rather than `/` because `/` returns 404
            # by design when no tree exists yet (operator imports the GEDCOM
            # post-install). The login route resolves as soon as
            # config.ini.php, the schema, and any admin user exist.
            # X-Forwarded-Proto: https tells nginx the upstream already
            # terminated TLS, bypassing the enforce-https redirect (see
            # rootfs/etc/nginx/conf.d/default.conf $isHttps logic). Keeps
            # the healthcheck honest regardless of ENFORCE_HTTPS value.
            test: ["CMD-SHELL", "curl -sf -H 'X-Forwarded-Proto: https' 'http://localhost/index.php?route=/login' -o /dev/null || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            # The probe requires config.ini.php + DB schema + (optional)
            # admin user — first-boot bootstrap on slow disks (NAS, cold
            # composer cache) can exceed 30s. 60s covers WEBTREES_AUTO_SEED
            # cleanly without dragging the docker-compose up wait time.
            start_period: 60s
        restart: unless-stopped
        volumes:
            - app:/var/www/html:ro
            - media:/var/www/html/data/media:ro
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - default

# Network configuration
networks:
    # Default network for container communication
    default:
