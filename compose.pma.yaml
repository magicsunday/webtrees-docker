# phpMyAdmin service for database management (development only)
#
# WARNING: Do not use in production. phpMyAdmin adds a significant attack surface.
# For production database access, use SSH tunneling or a VPN instead.

services:
    pma:
        depends_on:
            - db
        image: phpmyadmin:5.2
        restart: unless-stopped
        environment:
            PMA_HOST: ${MARIADB_HOST}
            PMA_PORT: ${MARIADB_PORT}
            UPLOAD_LIMIT: ${UPLOAD_LIMIT}
            MEMORY_LIMIT: 512M
        volumes:
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        networks:
            - default
